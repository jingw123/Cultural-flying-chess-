<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣美食拼音大冒險 - 蛇梯棋</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --land-color: #e8f5e9;
            --path-color: #ffffff;
            --text-color: #2e7d32;
            --thsr-color: #f39c12;
            --trap-color: #e74c3c;
        }

        body {
            font-family: "Microsoft JhengHei", cursive, sans-serif;
            background-color: #fffbe6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-color);
        }

        /* 台灣背景地圖容器 */
        #game-wrapper {
            position: relative;
            width: 380px;
            height: 600px;
            background: var(--land-color);
            border-radius: 50% 50% 40% 40% / 30% 30% 70% 70%; /* 模擬台灣形狀 */
            border: 4px solid #a5d6a7;
            margin-top: 20px;
            box-shadow: 20px 20px 60px #d9d6c3, -20px -20px 60px #ffffff;
            overflow: hidden;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(7, 1fr);
            padding: 20px;
            gap: 5px;
        }

        /* 標題與資訊 */
        h1 { margin: 10px 0 5px; font-size: 24px; text-shadow: 1px 1px 2px white; }
        #status-bar { font-weight: bold; margin-bottom: 10px; color: #1b5e20; }

        /* 格子樣式 */
        .cell {
            background: rgba(255, 255, 255, 0.7);
            border: 1.5px dashed #81c784;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 11px;
            position: relative;
            z-index: 1;
        }
        .cell.special { background: #fff9c4; border-style: solid; }
        .cell.thsr { border: 2px solid var(--thsr-color); color: var(--thsr-color); }
        .cell.trap { border: 2px solid var(--trap-color); color: var(--trap-color); }

        /* 棋子樣式 */
        .piece {
            width: 35px; height: 35px;
            position: absolute;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2));
        }

        /* 彈窗樣式 */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none;
            justify-content: center; align-items: center; z-index: 1000;
        }
        .quiz-card {
            background: white; padding: 25px; border-radius: 20px;
            max-width: 300px; text-align: center; border: 5px solid #81c784;
        }
        .option-btn {
            display: block; width: 100%; padding: 10px; margin: 10px 0;
            border: 2px solid #81c784; border-radius: 10px; background: none;
            cursor: pointer; font-size: 16px;
        }
        .option-btn:hover { background: #e8f5e9; }

        /* 控制面板 */
        .controls {
            margin-top: 15px; text-align: center;
            background: white; padding: 15px; border-radius: 20px; width: 340px;
        }
        #dice-btn {
            background: #4caf50; color: white; border: none; padding: 10px 40px;
            font-size: 20px; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px #2e7d32;
        }
        #dice-btn:active { transform: translateY(2px); box-shadow: 0 2px #2e7d32; }

        #qrcode { margin-top: 10px; }
    </style>
</head>
<body>

    <h1>🏮 台灣美食大冒險</h1>
    <div id="status-bar">正在載入地圖...</div>

    <div id="game-wrapper">
        </div>

    <div class="controls">
        <div id="dice-display" style="font-size: 40px;">🎲</div>
        <button id="dice-btn" onclick="rollDice()">擲骰子</button>
        <div id="player-info" style="margin-top: 10px;"></div>
        <div id="qrcode" title="掃描 QR Code 分享遊戲"></div>
        <p style="font-size: 10px; color: #999;">掃描 QR Code 即可加入遊戲</p>
    </div>

    <div id="modal-overlay">
        <div class="quiz-card" id="quiz-card">
            <h2 id="quiz-food">美食名稱</h2>
            <p>這個美食的拼音是？</p>
            <div id="quiz-options"></div>
        </div>
    </div>

    <script>
        // 美食資料庫 (含拼音題目)
        const foods = [
            { name: "珍珠奶茶", pinyin: "Zhēnzhū Nǎichá", options: ["Zhēnzhū Nǎichá", "Zhēnzhū Lǎichá", "Zēnzū Nǎicá"] },
            { name: "牛肉麵", pinyin: "Niúròumiàn", options: ["Niúròumiàn", "Liúròumiàn", "Niúlòumiàn"] },
            { name: "小籠包", pinyin: "Xiǎolóngbāo", options: ["Xiǎolóngbāo", "Xiǎonóngbāo", "Siǎolóngbāo"] },
            { name: "臭豆腐", pinyin: "Chòudòufu", options: ["Chòudòufu", "Còudòufu", "Chòudòuhǔ"] },
            { name: "滷肉飯", pinyin: "Lǔròufàn", options: ["Lǔròufàn", "Nǔròufàn", "Lǔlòufàn"] },
            { name: "鳳梨酥", pinyin: "Fènglísū", options: ["Fènglísū", "Fènlísū", "Hènglísū"] }
        ];

        // 地圖格子設定 (35格 S型)
        const totalCells = 35;
        const specialCells = {
            5: { type: 'thsr', target: 15, label: "🚄 高鐵加速" },
            22: { type: 'thsr', target: 32, label: "🚀 101電梯" },
            12: { type: 'trap', target: 3, label: "🚥 塞車了" },
            28: { type: 'trap', target: 18, label: "🌧️ 遇大雨" }
        };

        let players = [
            { id: 1, pos: 0, emoji: "🐻‍❄️", color: "#e74c3c" },
            { id: 2, pos: 0, emoji: "🐱", color: "#3498db" }
        ];
        let currentPlayerIdx = 0;
        let isMoving = false;

        // 初始化地圖格子
        function initBoard() {
            const wrapper = document.getElementById('game-wrapper');
            for (let i = 0; i < totalCells; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                // 決定 S 型排列順序
                let row = Math.floor(i / 5);
                let col = (row % 2 === 0) ? (i % 5) : (4 - (i % 5));
                cell.style.gridRow = 7 - row;
                cell.style.gridColumn = col + 1;

                if (i === 0) cell.innerHTML = "起點";
                else if (i === totalCells - 1) cell.innerHTML = "🏁 玉山";
                else if (specialCells[i]) {
                    cell.classList.add(specialCells[i].type);
                    cell.innerHTML = `<b>${specialCells[i].label}</b>`;
                } else if (i % 5 === 0) {
                    const food = foods[Math.floor(Math.random() * foods.length)];
                    cell.innerHTML = `🍰<br>${food.name}`;
                    cell.dataset.foodIdx = foods.indexOf(food);
                    cell.classList.add('special');
                } else {
                    cell.innerHTML = i;
                }
                cell.id = `cell-${i}`;
                wrapper.appendChild(cell);
            }

            // 初始化棋子
            players.forEach(p => {
                const div = document.createElement('div');
                div.className = 'piece';
                div.id = `player-${p.id}`;
                div.innerHTML = p.emoji;
                document.body.appendChild(div);
            });
            updateUI();
        }

        function updateUI() {
            players.forEach(p => {
                const cell = document.getElementById(`cell-${p.pos}`);
                const rect = cell.getBoundingClientRect();
                const el = document.getElementById(`player-${p.id}`);
                el.style.left = `${rect.left + (p.id === 1 ? 5 : 20)}px`;
                el.style.top = `${rect.top + (p.id === 1 ? 5 : 20)}px`;
            });
            const cp = players[currentPlayerIdx];
            document.getElementById('status-bar').innerText = `輪到玩家 ${cp.emoji} 擲骰子`;
        }

        async function rollDice() {
            if (isMoving) return;
            isMoving = true;
            document.getElementById('dice-btn').disabled = true;

            const roll = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice-display').innerText = ['🎲','⚀','⚁','⚂','⚃','⚄','⚅'][roll];
            
            await movePlayer(currentPlayerIdx, roll);
        }

        async function movePlayer(pIdx, steps) {
            let p = players[pIdx];
            for (let i = 0; i < steps; i++) {
                if (p.pos < totalCells - 1) {
                    p.pos++;
                    updateUI();
                    await new Promise(r => setTimeout(r, 400));
                }
            }

            // 檢查特殊格子
            const currentCell = document.getElementById(`cell-${p.pos}`);
            
            // 1. 檢查美食題目
            if (currentCell.dataset.foodIdx !== undefined) {
                await startQuiz(pIdx, currentCell.dataset.foodIdx);
            } 
            // 2. 檢查蛇梯
            else if (specialCells[p.pos]) {
                const effect = specialCells[p.pos];
                document.getElementById('status-bar').innerText = effect.label;
                await new Promise(r => setTimeout(r, 800));
                p.pos = effect.target;
                updateUI();
            }

            if (p.pos >= totalCells - 1) {
                alert(`🎉 恭喜玩家 ${p.emoji} 成功登頂玉山！`);
                location.reload();
            } else {
                currentPlayerIdx = (currentPlayerIdx + 1) % players.length;
                isMoving = false;
                document.getElementById('dice-btn').disabled = false;
                updateUI();
            }
        }

        function startQuiz(pIdx, foodIdx) {
            return new Promise(resolve => {
                const food = foods[foodIdx];
                const overlay = document.getElementById('modal-overlay');
                const optionsDiv = document.getElementById('quiz-options');
                
                document.getElementById('quiz-food').innerText = food.name;
                optionsDiv.innerHTML = '';
                overlay.style.display = 'flex';

                food.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt;
                    btn.onclick = () => {
                        if (opt === food.pinyin) {
                            alert("✅ 太棒了！答對了！");
                        } else {
                            alert(`❌ 答錯了，正確拼音是 ${food.pinyin}。退後兩格！`);
                            players[pIdx].pos = Math.max(0, players[pIdx].pos - 2);
                        }
                        overlay.style.display = 'none';
                        updateUI();
                        resolve();
                    };
                    optionsDiv.appendChild(btn);
                });
            });
        }

        // 產生 QR Code
        window.onload = () => {
            initBoard();
            new QRCode(document.getElementById("qrcode"), {
                text: window.location.href,
                width: 80,
                height: 80
            });
        };
    </script>
</body>
</html>
