<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大學面試錄取挑戰賽 - 專業語音版</title>
    <style>
        :root { --navy: #101820; --accent: #2c3e50; --gold: #c5a059; --white: #ffffff; }
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #050505; color: var(--white);
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 20px; min-height: 100vh;
        }
        #interview-room {
            width: 100%; max-width: 650px; background: var(--navy);
            border: 2px solid #333; border-radius: 12px; overflow: hidden;
            position: relative; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }
        #timer-bar-container { width: 100%; height: 6px; background: #111; }
        #timer-bar { width: 100%; height: 100%; background: #e74c3c; transition: width 0.1s linear; }

        #professor-area {
            height: 280px; background: radial-gradient(circle, #2c3e50 0%, #101820 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-bottom: 1px solid #333;
        }
        #professor-avatar { font-size: 100px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        #speech-bubble {
            background: rgba(255,255,255,0.95); color: #1a1a1a; padding: 18px 25px;
            width: 85%; border-radius: 5px; margin: 15px auto;
            font-weight: 500; line-height: 1.6; font-size: 17px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #options-area { padding: 25px; background: #fdfdfd; display: flex; flex-direction: column; gap: 12px; min-height: 250px; }
        .option-btn {
            background: white; border: 1.5px solid #d1d1d1; padding: 14px 20px;
            border-radius: 4px; cursor: pointer; color: #2c3e50; font-size: 15px;
            text-align: left; transition: all 0.2s ease;
        }
        .option-btn:hover { border-color: var(--gold); background: #f9f6f0; transform: translateX(5px); }

        #result-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(16, 24, 32, 0.96); display: none;
            flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        #grade-display { font-size: 100px; font-weight: 900; letter-spacing: -5px; margin-bottom: 5px; }
        #feedback-text { font-size: 18px; margin-bottom: 25px; text-align: center; max-width: 80%; line-height: 1.5; color: #ccc; }
        
        button#next-btn {
            background: var(--gold); color: white; border: none; padding: 12px 40px;
            font-size: 18px; border-radius: 2px; cursor: pointer; letter-spacing: 2px;
        }
        .status-info { margin-top: 15px; font-size: 14px; color: #888; }
    </style>
</head>
<body>

    <h2 style="color: var(--gold); font-weight: 300; letter-spacing: 5px;">UNIVERSITY INTERVIEW</h2>
    
    <div id="interview-room">
        <div id="timer-bar-container"><div id="timer-bar"></div></div>
        <div id="professor-area">
            <div id="professor-avatar">👨‍🏫</div>
            <div id="speech-bubble">您好，歡迎參加面試。請點擊按鈕開始。</div>
        </div>
        <div id="options-area">
            <button class="option-btn" onclick="startGame()">[ 點擊進入面試現場 ]</button>
        </div>
        <div id="result-overlay">
            <div id="grade-display">A+</div>
            <div id="feedback-text">評語</div>
            <button id="next-btn" onclick="nextQuestion()">繼續下一題</button>
        </div>
    </div>

    <div class="status-info">目前累積點數：<span id="score">0</span> | 語音速率：0.7x</div>
