<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大學面試：十題深度模擬系統</title>
    <style>
        :root { --深藍: #001f3f; --金: #ffcc00; --白: #ffffff; --背景: #0a0a0a; --紅: #ff4136; --綠: #2ecc40; }
        body { background: var(--背景); color: var(--白); font-family: "Microsoft JhengHei", sans-serif; display: flex; flex-direction: column; align-items: center; padding: 5px; margin: 0; height: 100vh; overflow: hidden; }
        #容器 { width: 98%; max-width: 650px; background: var(--深藍); border: 3px solid var(--白); border-radius: 20px; overflow: hidden; position: relative; display: flex; flex-direction: column; height: 92vh; }
        #計時條 { width: 0%; height: 12px; background: var(--綠); transition: width 0.1s linear; }
        #面試官區 { padding: 10px; display: flex; flex-direction: column; align-items: center; background: #002b55; }
        #角色頭像 { font-size: 55px; margin: 0; }
        #角色名稱 { color: var(--金); font-size: 22px; font-weight: bold; }
        #對話框 { background: white; color: #000; padding: 12px; width: 92%; border-radius: 12px; font-weight: bold; font-size: 22px; line-height: 1.4; min-height: 45px; }
        #選項區 { padding: 15px; background: #eee; display: flex; flex-direction: column; gap: 10px; flex-grow: 1; overflow-y: auto; }
        .按鈕 { background: white; border: 3px solid #444; padding: 12px; border-radius: 12px; cursor: pointer; text-align: left; font-size: 19px; color: #000; font-weight: bold; line-height: 1.3; }
        .按鈕:hover { background: var(--金); }
        .提示框 { background: #fff9db; border-left: 5px solid #fab005; padding: 10px; font-size: 17px; color: #444; margin-bottom: 5px; line-height: 1.5; }
        #結果層 { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 15px; text-align: center; }
        #結果標題 { font-size: 55px; font-weight: 900; color: var(--金); margin-bottom: 10px; }
        #結果評價 { font-size: 22px; color: var(--白); text-align: left; width: 90%; line-height: 1.6; overflow-y: auto; max-height: 65%; padding: 10px; border: 1px solid #555; }
        .大按鈕 { background: var(--金); color: #000; border: none; padding: 15px 40px; font-size: 24px; border-radius: 12px; cursor: pointer; font-weight: 900; margin-top: 15px; }
        #進度 { font-size: 16px; color: var(--金); margin: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="容器">
        <div id="計時條"></div>
        <div id="面試官區">
            <div id="角色頭像">👋</div>
            <div id="角色名稱">面試準備室</div>
            <div id="對話框">考生你好，歡迎來到面試現場。</div>
        </div>
        <div id="選項區">
            <button class="按鈕" onclick="考官登場()" style="text-align:center;">【 點擊進入面試會場 】</button>
        </div>
        <div id="結果層">
            <div id="結果標題">錄取狀態</div>
            <div id="結果評價">評語內容</div>
            <button class="大按鈕" id="下一步按鈕" onclick="下一動作()">點擊繼續</button>
        </div>
    </div>
    <div id="進度">準備中</div>

    <script>
        const 面試官庫 = [
            { 名稱: "林教授 (資深學者)", 頭像: "👴", 語速: 0.65, pitch: 0.65, intro: "你好啊...我是林教授。我最喜歡看到有活力、充滿熱情的學生了。放鬆點，我們聊聊天吧。" },
            { 名稱: "張主任 (系主任)", 頭像: "👩‍💼", 語速: 0.85, pitch: 1.0, intro: "你好，我是張主任。面試講求邏輯與實力，請務必精準表達你的入學動機。" },
            { 名稱: "李組長 (招生專員)", 頭像: "🤵", 語速: 0.95, pitch: 1.0, intro: "我是招生組李組長。我會評估你的特質是否符合校風，請直接回答重點。" }
        ];

        const 題庫 = [
            { 問: "第一題：請簡單介紹自己，並說明為什麼想報考「我們」學校的這個系？", 選: [
                { t: "貴系在業界的名聲很好，且課程規劃符合我的目標，希望能在此深造。", s: "A", f: "回答得很好，展現了你對系所的研究與對未來的明確規劃。" },
                { t: "因為這間大學很有名，且離家近，我覺得在這裡讀書比較方便。", s: "B", f: "很誠實，但面試官更希望聽到你對「專業領域」的熱情。" },
                { t: "我其實不太確定，只是看分數剛好夠，就報名試試看。", s: "F", f: "這是面試大忌，缺乏動機的人是很難讓教授錄取的。" }
            ]},
            { 問: "第二題：如果你發現入學後課業太重跟不上進度，你會怎麼辦？", 選: [
                { t: "我會主動找教授或學長姊請教，並調整時間管理，把基礎打好。", s: "A", f: "主動解決問題是大學最重要的能力，你的態度非常正面。" },
                { t: "我會花更多時間死背課本，就算不睡覺也要把成績考好。", s: "B", f: "雖然勤奮，但死讀書效率不高，建議多與同儕討論交流。" },
                { t: "我會考慮退選或是換別的系讀，那可能是課程太難不適合我。", s: "F", f: "遇到挫折就逃避，會讓教授懷疑你的抗壓性與穩定度。" }
            ]},
            { 問: "第三題：你覺得自己最大的優點是什麼？請舉例說明。", 選: [
                { t: "我非常負責任，只要是小組分工，我一定會準時且高品質完成。", s: "A", f: "負責是團隊合作的基石，這項特質非常受教授青睞。" },
                { t: "我很聰明，學習東西比別人都快，考試對我來說非常簡單。", s: "B", f: "有自信很好，但面試中展現「團隊價值」會比強調個人聰明更重要。" },
                { t: "我沒什麼特別的優點，就是一個普通的學生。", s: "F", f: "面試是推銷自己的機會，一定要找到並認可自己的閃光點。" }
            ]},
            { 問: "第四題：如果你在小組報告中遇到一個完全不幫忙的組員，你會？", 選: [
                { t: "我會先私下溝通了解困難，並重新分配他能勝任的工作內容。", s: "A", f: "具備領導力與同理心，這正是我們需要的高素質人才。" },
                { t: "為了不影響分數，我會默默地把他那份做完，雖然很辛苦。", s: "B", f: "負責但缺乏溝通技巧，學習帶動隊友才是真正的領導力。" },
                { t: "我會直接跟教授報告，請教授扣他的分數。", s: "F", f: "缺乏內部溝通就直接告狀，會被認為社交應變能力不足。" }
            ]},
            { 問: "第五題：大學生活很多元，你打算如何分配學業與社團時間？", 選: [
                { t: "我會以學業為中心，並參加一兩個社團，學習跨領域溝通能力。", s: "A", f: "計畫很踏實，展現了懂得平衡生活與專業的自律能力。" },
                { t: "我打算大一大二先瘋狂玩社團，大三再開始努力讀書。", s: "B", f: "大學學業是累積的，荒廢前期可能會讓專業銜接變得吃力。" },
                { t: "我沒打算參加社團，我覺得把書讀好拿到第一名才是最重要的。", s: "F", f: "過於封閉會讓你錯失大學重要的社交與多元成長機會。" }
            ]},
            { 問: "第六題：你最近看過什麼印象深刻的新聞嗎？聊聊你的看法。", 選: [
                { t: "我關注最近的環境與科技議題，這跟我未來的專業很有關聯。", s: "A", f: "很優秀，能將社會脈動與個人學習動機緊密結合。" },
                { t: "我都在看藝人的消息，覺得藝人的生活很有趣，可以舒緩壓力。", s: "B", f: "生活化沒關係，但在面試中，教授希望看到你對世界的洞察力。" },
                { t: "我都在準備考試，完全沒有時間看任何新聞。", s: "F", f: "缺乏社會參與感的學生，很難在未來的社會競爭中取得領先。" }
            ]},
            { 問: "第七題：如果你同時考上兩間不錯的大學，你會怎麼選擇？", 選: [
                { t: "我會比較哪一間的教學資源與研究方向更符合我的專業興趣。", s: "A", f: "分析理性且目標明確，是一位對自己負責的考生。" },
                { t: "我會看哪一間名氣大、離家近，或是校園比較漂亮來決定。", s: "B", f: "這些是外在條件，建議優先考量核心的學術環境。" },
                { t: "聽爸媽的意見，他們覺得哪一間好我就去讀哪一間。", s: "F", f: "大學生應具備獨立思考力，過度依賴父母會顯得不夠成熟。" }
            ]},
            { 問: "第八題：面對現在很紅的 AI 工具，你打算如何運用它來輔助學習？", 選: [
                { t: "我會把它當成蒐集資料與優化邏輯的助手，但思考還是自己做。", s: "A", f: "觀念非常正確。科技是工具，主體性才是你的競爭力。" },
                { t: "我會請它幫我寫報告，這樣我可以節省很多時間去做別的事。", s: "F", f: "這是放棄思考的行為，教授絕對不會錄取缺乏誠信的學生。" },
                { t: "我覺得那不靠譜，我會堅持用傳統的方法慢慢讀書就好。", s: "B", f: "稍嫌保守，學習與新科技共存也是現代學生的必修課。" }
            ]},
            { 問: "第九題：你希望畢業後的自己，變成一個什麼樣的人？", 選: [
                { t: "我希望成為具備專業技能且能回饋社會的人，為產業帶來貢獻。", s: "A", f: "目標正面且遠大，這完全符合本系的辦學初衷。" },
                { t: "我希望能找到一份高薪穩定的工作，過上安穩的生活。", s: "B", f: "很實在的想法，但若能多談談專業價值會更有說服力。" },
                { t: "還沒想過，目前只想先順利拿到畢業證書再說。", s: "F", f: "缺乏願景會讓考官擔心你進校後會因為失去目標而頹廢。" }
            ]},
            { 問: "第十題：請給考官一個一定要錄取你的理由。", 選: [
                { t: "因為我不怕困難，且我對這個領域的熱情能讓我持續精進。", s: "A", f: "充滿自信且有力量的結尾，非常好！" },
                { t: "因為這是我這輩子唯一的願望，如果沒錄取我會非常難過。", s: "B", f: "面試看的是能力而非心情，請嘗試用實力說服考官。" },
                { t: "因為我覺得貴系也需要像我這種有潛力的學生來平衡一下。", s: "F", f: "語氣太過隨便，沒有展現出對本系的尊重。" }
            ]}
        ];

        let 目前索引 = 0, 目前官 = null, 總積分 = 0, 遊戲計時器, 剩餘時間 = 20;

        function 朗讀(文字) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(文字);
            msg.lang = 'zh-TW';
            msg.rate = 目前官 ? 目前官.語速 : 0.8;
            msg.pitch = 目前官 ? 目前官.pitch : 1.0;
            window.speechSynthesis.speak(msg);
        }

        function 考官登場() {
            目前官 = 面試官庫[Math.floor(Math.random() * 面試官庫.length)];
            document.getElementById('角色名稱').innerText = 目前官.名稱;
            document.getElementById('角色頭像').innerText = 目前官.頭像;
            document.getElementById('對話框').innerText = "點擊按鈕聽取考官招呼。";
            
            const 選項區 = document.getElementById('選項區');
            選項區.innerHTML = `<button class="按鈕" onclick="考官介紹()" style="text-align:center;">【 聽取考官招呼 】</button>`;
        }

        function 考官介紹() {
            document.getElementById('對話框').innerText = 目前官.intro;
            朗讀(目前官.intro);
            const 選項區 = document.getElementById('選項區');
            選項區.innerHTML = `<button class="按鈕" onclick="自我介紹環節()" style="text-align:center; background:var(--金);">【 進行自我介紹 】</button>`;
        }

        function 自我介紹環節() {
            document.getElementById('對話框').innerText = "現在，請向考官進行簡單的自我介紹。";
            朗讀("現在，請向考官進行自我介紹。結束後請點擊按鈕開始正式問答。");
            const 選項區 = document.getElementById('選項區');
            選項區.innerHTML = `
                <div class="提示框">
                    <b>💡 自我介紹小撇步：</b><br>
                    1. <b>我是誰</b>：名字、高中背景。<br>
                    2. <b>我的強項</b>：你有什麼優點或特殊的經歷？<br>
                    3. <b>為什麼來</b>：為什麼選擇我們學校、這個系？
                </div>
                <button class="按鈕" onclick="正式面試開始()" style="text-align:center; background:var(--綠); color:white;">【 自我介紹完畢，開始問答 】</button>
            `;
        }

        function 正式面試開始() {
            目前索引 = 0; 總積分 = 0;
            顯示題目();
        }

        function 顯示題目() {
            const 題目 = 題庫[目前索引];
            document.getElementById('對話框').innerText = 題目.問;
            document.getElementById('進度').innerText = `目前進度：${目前索引 + 1} / 10`;
            document.getElementById('結果層').style.display = 'none';
            朗讀(題目.問);

            const 選項區 = document.getElementById('選項區');
            選項區.innerHTML = '';
            題目.選.forEach(x => {
                const b = document.createElement('button');
                b.className = '按鈕';
                b.innerText = x.t;
                b.onclick = () => 處理回答(x);
                選項區.appendChild(b);
            });
            啟動計時();
        }

        function 啟動計時() {
            剩餘時間 = 20; 
            const 條 = document.getElementById('計時條');
            clearInterval(遊戲計時器);
            遊戲計時器 = setInterval(() => {
                剩餘時間 -= 0.1;
                條.style.width = (剩餘時間 / 20 * 100) + '%';
                if (剩餘時間 <= 0) { clearInterval(遊戲計時器); 處理回答({s:'F', f:'沈默太久了。在面試中，這會讓考官覺得你沒準備好喔。'}); }
            }, 100);
        }

        function 處理回答(選) {
            clearInterval(遊戲計時器);
            總積分 += 選.s === 'A' ? 100 : (選.s === 'B' ? 50 : 0);
            document.getElementById('結果層').style.display = 'flex';
            document.getElementById('結果標題').innerText = "評價：" + 選.s;
            document.getElementById('結果標題').style.color = 選.s === 'F' ? '#ff4136' : '#ffcc00';
            document.getElementById('結果評價').innerText = 選.f;
            朗讀(選.f);
        }

        function 下一動作() {
            目前索引++;
            if (目前索引 < 10) 顯示題目();
            else 結算結果();
        }

        function 結算結果() {
            let 狀態 = "";
            let 總結 = "";
            let 顏色 = "";

            if (總積分 >= 850) {
                狀態 = "正式錄取";
                顏色 = "#2ecc40";
                總結 = `<b>${目前官.名稱} 的分析建議：</b><br>
                        太棒了！你的表現非常優秀，說話很有邏輯。你不僅對本系有深入了解，更展現了強大的熱忱。你在各個面向的回答都很完美，本校非常歡迎你的加入。請繼續保持這份自信，你在這裡一定會有非常棒的發展。`;
            } else if (總積分 >= 550) {
                狀態 = "進入備取";
                顏色 = "#ffcc00";
                總結 = `<b>${目前官.名稱} 的分析建議：</b><br>
                        你的回答相當穩重，也具備基本的素養。但在某些關於「未來規劃」的回答中，顯得稍微保守了一點，特色不夠鮮明。如果你能再更具體地展現你的亮點，錄取機會會更高。不要灰心，你已經具備很好的底子了，加油。`;
            } else {
                狀態 = "未通過";
                顏色 = "#ff4136";
                總結 = `<b>${目前官.名稱} 的分析建議：</b><br>
                        遺憾，這次的表現顯示你對本系的準備還不夠充分。在許多問題上，你的回答顯得比較被動，缺乏自主思考。面試是一個推銷自己的過程，建議你之後要更深入了解報考系所的特色，練習更有說服力地介紹自己。失敗是成長的養分，繼續努力。`;
            }

            document.getElementById('結果標題').innerText = 狀態;
            document.getElementById('結果標題').style.color = 顏色;
            document.getElementById('結果評價').innerHTML = 總結;
            document.getElementById('下一步按鈕').innerText = "重新練習";
            document.getElementById('下一步按鈕').onclick = () => location.reload();
            朗讀("面試結束。結果是：" + 狀態 + "。請查看教授給您的詳細建議報告。");
        }
    </script>
</body>
</html>
