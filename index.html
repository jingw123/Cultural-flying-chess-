<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大學面試：七題深度挑戰賽</title>
    <style>
        :root { --深藍: #0f172a; --金: #fbbf24; --白: #ffffff; --背景: #020617; --紅: #ef4444; }
        body { background: var(--背景); color: var(--白); font-family: "Microsoft JhengHei", sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        #容器 { width: 100%; max-width: 600px; background: var(--深藍); border-radius: 20px; overflow: hidden; position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.8); border: 1px solid #1e293b; }
        #計時外框 { width: 100%; height: 12px; background: #000; }
        #計時條 { width: 100%; height: 100%; background: #22c55e; transition: width 0.1s linear; }
        .緊急 { animation: blink 0.5s infinite; background: var(--紅) !important; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        #面試官區 { height: 280px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); padding: 20px; text-align: center; }
        #角色頭像 { font-size: 80px; margin-bottom: 10px; transition: transform 0.2s; }
        #角色名稱 { color: var(--金); font-size: 16px; font-weight: bold; margin-bottom: 5px; }
        #對話框 { background: white; color: #111; padding: 15px 20px; width: 85%; border-radius: 12px; font-weight: bold; line-height: 1.6; font-size: 17px; position: relative; }

        #選項區 { padding: 25px; background: #f8fafc; display: flex; flex-direction: column; gap: 12px; }
        .按鈕 { background: white; border: 2px solid #e2e8f0; padding: 16px; border-radius: 10px; cursor: pointer; text-align: left; font-size: 15px; color: #1e293b; transition: 0.3s; font-weight: 500; }
        .按鈕:hover { border-color: var(--金); background: #fffbeb; transform: translateY(-2px); }

        #結果層 { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        #等第 { font-size: 90px; font-weight: 900; color: var(--金); }
        #回饋語 { padding: 20px 40px; font-size: 16px; color: #cbd5e1; }
        .主按鈕 { background: var(--金); color: #000; border: none; padding: 12px 40px; font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #進度文字 { color: #64748b; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

    <h2 style="letter-spacing: 5px; color: var(--金);">🎓 大學面試：深度挑戰系統</h2>
    
    <div id="容器">
        <div id="計時外框"><div id="計時條"></div></div>
        <div id="面試官區">
            <div id="角色頭像">👨‍🏫</div>
            <div id="角色名稱">點擊開始</div>
            <div id="對話框">面試即將開始，請做好準備。</div>
        </div>
        <div id="選項區">
            <button class="按鈕" onclick="遊戲開始()">【 進入面試會場 】</button>
        </div>
        
        <div id="結果層">
            <div id="等第">A+</div>
            <div id="回饋語">回饋內容</div>
            <button class="主按鈕" onclick="下一題()">點擊繼續</button>
        </div>
    </div>
    <div id="進度文字">尚未開始</div>

    <script>
        const 面試官庫 = [
            { 名稱: "林教授", 頭像: "👴", 語速: 0.75, 嚴格度: 0.9 },
            { 名稱: "張主任", 頭像: "👩‍💼", 語速: 1.0, 嚴格度: 1.2 },
            { 名稱: "王總裁", 頭像: "🤵", 語速: 0.9, 嚴格度: 1.1 }
        ];

        const 題目庫 = [
            { 問: "第一題：請簡單介紹你自己，並說說看為什麼你想來這裡讀書？", 選: [
                { t: "我一直很嚮往貴系的學習氣氛，這是我長期以來的目標。", s: "A", f: "態度很誠懇，讓人印象深刻。" },
                { t: "因為這間學校排名很好，對我以後找工作應該會比較方便。", s: "B", f: "雖然實際，但可以多聊聊學術興趣。" },
                { t: "我其實不太確定，就只是想說有機會就來試試看。", s: "F", f: "面試時表現得太隨意會讓教授反感喔。" }
            ]},
            { 問: "第二題：如果你遇到一個非常難相處的隊友，你會怎麼辦？", 選: [
                { t: "我會先試著溝通，如果不行就請大家分配好範圍，把事情做完。", s: "A", f: "具備良好的溝通彈性，非常棒。" },
                { t: "我會自己承擔大部分工作，雖然累但能確保報告準時完成。", s: "B", f: "很認真，但長遠來看要注意心理平衡。" },
                { t: "我會直接拒絕跟他合作，或者乾脆自己換一組。", s: "F", f: "逃避不是解決問題的最好方式。" }
            ]},
            { 問: "第三題：每個人都有缺點。你覺得你目前最大的缺點是什麼？", 選: [
                { t: "我有時候會想太多，但我現在學會用清單來加速做決定的時間。", s: "A", f: "懂得面對缺點並改善，教授很欣賞這種態度。" },
                { t: "我最大的缺點就是太完美主義，這讓我很追求完美。", s: "B", f: "這聽起來像是優點，面試官可能會覺得你沒講實話。" },
                { t: "我覺得我沒什麼大缺點，目前各方面都表現得挺好的。", s: "F", f: "缺乏自我反省的能力，這對學習是不利的。" }
            ]},
            { 問: "第四題：進入大學後，你打算怎麼管理你的生活跟學業？", 選: [
                { t: "我會以功課為主，並參加一兩個有興趣的社團來增廣見聞。", s: "A", f: "計畫很踏實，目標明確。" },
                { t: "我想多打工賺錢，練習出社會之後需要具備的能力。", s: "B", f: "很好，但要注意不要讓打工影響到課業。" },
                { t: "我沒什麼具體計畫，大概就是走一步算一步吧。", s: "F", f: "教授會擔心你進大學後會迷失方向。" }
            ]},
            { 問: "第五題：如果你在學習上遇到一直解決不了的難題，你會怎麼辦？", 選: [
                { t: "我會先冷靜思考，再上網找資料，還是不懂就去請教老師。", s: "A", f: "這才是大學生該有的主動學習態度！" },
                { t: "我會直接去問同學或是學長姊，請他們直接告訴我正確答案。", s: "B", f: "雖然快，但建議先自己思考過會更有進步。" },
                { t: "我會覺得這個題目不適合我，乾脆放棄去做別的事。", s: "F", f: "遇到困難就放棄，這樣會很難學好專業喔。" }
            ]},
            { 問: "第六題：你對我們系畢業後的未來發展有什麼想像？", 選: [
                { t: "我希望能發揮所學解決實務問題，成為這個領域的專業人士。", s: "A", f: "目標清楚且正面，非常好。" },
                { t: "我希望能考上公務員或是找一份安穩的辦公室工作。", s: "B", f: "這也是一個路徑，但可以再更有企圖心一點。" },
                { t: "我還沒想過這個，目前只想先拿到畢業證書再說。", s: "F", f: "對職涯完全沒想法，會降低你的錄取率。" }
            ]},
            { 問: "第七題：最後，請給我們一個非錄取你不可的理由。", 選: [
                { t: "因為我不怕困難，且具備極強的學習熱情與適應能力。", s: "A", f: "總結得很有力，展現了自信！" },
                { t: "因為我父母很支持我，這也是我全家人最期待的結果。", s: "B", f: "很感人，但要多強調個人的競爭力喔。" },
                { t: "因為我覺得貴系也需要像我這種多元背景的人才。", s: "F", f: "回答得有點太空泛了，可以再具體一點。" }
            ]}
        ];

        let 目前索引 = 0, 目前官 = null, 總得分 = 0, 快慢計 = [], 遊戲計時器, 剩餘時間 = 15;

        function 朗讀(文字) {
            window.speechSynthesis.cancel();
            const 語音 = new SpeechSynthesisUtterance(文字);
            語音.lang = 'zh-TW'; 語音.rate = 目前官.語速;
            window.speechSynthesis.speak(語音);
        }

        function 遊戲開始() {
            目前官 = 面試官庫[Math.floor(Math.random() * 面試官庫.length)];
            目前索引 = 0; 總得分 = 0; 快慢計 = [];
            document.getElementById('角色名稱').innerText = 目前官.名稱;
            document.getElementById('角色頭像').innerText = 目前官.頭像;
            顯示題目();
        }

        function 顯示題目() {
            const 題目 = 題目庫[目前索引];
            document.getElementById('對話框').innerText = 題目.問;
            document.getElementById('結果層').style.display = 'none';
            document.getElementById('進度文字').innerText = `目前進度：${目前索引 + 1} / 7`;
            朗讀(題目.問);

            const 選項區 = document.getElementById('選項區');
            選項區.innerHTML = '';
            題目.選.sort(() => Math.random() - 0.5).forEach(x => {
                const b = document.createElement('button');
                b.className = '按鈕';
                b.innerText = x.t;
                b.onclick = () => 處理回答(x);
                選項區.appendChild(b);
            });
            啟動計時();
        }

        function 啟動計時() {
            剩餘時間 = 15; 
            const 條 = document.getElementById('計時條');
            條.classList.remove('緊急');
            clearInterval(遊戲計時器);
            const 開始時間 = Date.now();
            遊戲計時器 = setInterval(() => {
                剩餘時間 -= 0.1;
                條.style.width = (剩餘時間 / 15 * 100) + '%';
                if (剩餘時間 <= 5) 條.classList.add('緊急');
                if (剩餘時間 <= 0) { clearInterval(遊戲計時器); 處理回答({s:'F', f:'反應太慢會讓面試官覺得你沒準備。'}); }
            }, 100);
            目前計時 = 開始時間;
        }

        function 處理回答(選) {
            clearInterval(遊戲計時器);
            const 耗時 = (Date.now() - 目前計時) / 1000;
            快慢計.push(耗時);
            
            let 等第 = 選.s;
            let 分 = 0;
            if(等第==='A') 分 = 100; else if(等第==='B') 分 = 60; else 分 = 0;
            
            總得分 += Math.round(分 / 目前官.嚴格度);

            document.getElementById('等第').innerText = 等第;
            document.getElementById('回饋語').innerText = 選.f;
            document.getElementById('結果層').style.display = 'flex';
            朗讀(`評價：${等第}。${選.f}`);
        }

        function 下一題() {
            目前索引++;
            if (目前索引 < 7) 顯示題目();
            else 結算報告();
        }

        function 結算報告() {
            const 平均反應 = (快慢計.reduce((a,b)=>a+b,0) / 7).toFixed(1);
            let 評價 = 總得分 > 600 ? "👑 正取錄取" : (總得分 > 400 ? "📋 進入備取" : "❌ 未錄取");
            
            let 建議 = `【面試總結分析報告】<br>
                        平均反應時間：${平均反應} 秒<br>
                        面試官：${目前官.名稱}<br><br>
                        面對七個深度問題，你的穩定度表現：<br>
                        ${平均反應 < 7 ? '你非常有自信，回答節奏掌握得很好。' : '你回答時稍顯猶豫，建議對常見問題多做練習。'}<br>
                        繼續加油！`;

            document.getElementById('結果層').innerHTML = `
                <h2 style="color:var(--金)">${評價}</h2>
                <div id="回饋語">${建議}</div>
                <button class="主按鈕" onclick="location.reload()">更換面試官再次特訓</button>
            `;
            朗讀(`面試結束。你的結果是：${評價}。請查看報告。`);
        }
    </script>
</body>
</html>
