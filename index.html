<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣環島飛行棋 - 輕量版</title>
    <style>
        :root {
            --primary: #2c3e50;
            --player-color: #e74c3c;
            --ai-color: #3498db;
            --thsr-color: #f39c12;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }

        /* 遊戲說明彈窗 */
        #rule-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            text-align: center;
        }

        /* 棋盤佈局 */
        .game-container {
            position: relative;
            width: 320px;
            height: 480px;
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(5, 80px);
            gap: 10px;
            margin-top: 20px;
        }

        .cell {
            background: white;
            border: 2px solid #ccc;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            position: relative;
        }

        .cell.thsr {
            background-color: #fff3e0;
            border-color: var(--thsr-color);
            color: var(--thsr-color);
        }

        .cell.thsr::after { content: "🚄高鐵"; font-size: 10px; }

        /* 棋子樣式 */
        .piece {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            position: absolute;
            transition: all 0.3s ease;
            z-index: 10;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .piece.player { background: var(--player-color); border: 2px solid white; }
        .piece.ai { background: var(--ai-color); border: 2px solid white; }

        /* 控制面板 */
        .controls {
            margin-top: 30px;
            text-align: center;
        }

        button {
            padding: 10px 30px;
            font-size: 18px;
            cursor: pointer;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:disabled { background: #95a5a6; }

        #status {
            margin-top: 10px;
            font-weight: bold;
            height: 24px;
        }
    </style>
</head>
<body>

    <div id="rule-modal">
        <div class="modal-content">
            <h2>🚄 台灣環島飛行棋</h2>
            <ul style="text-align: left;">
                <li>你的角色：🧋 珍奶 (紅)</li>
                <li>電腦角色：🍍 鳳梨酥 (藍)</li>
                <li><b>起飛：</b>隨便擲幾點都能出發！</li>
                <li><b>高鐵：</b>停在橘色格子可額外前進 3 格。</li>
                <li><b>碰撞：</b>踩到對方會把對方踢回起點。</li>
                <li><b>勝利：</b>其中一顆棋子繞完一圈即獲勝。</li>
            </ul>
            <button onclick="closeModal()">開始環島！</button>
        </div>
    </div>

    <h1>台灣環島大冒險</h1>
    
    <div id="status">準備好了嗎？</div>

    <div class="game-container" id="board">
        </div>

    <div class="controls">
        <div id="dice-result" style="font-size: 40px; margin-bottom: 10px;">🎲</div>
        <button id="roll-btn" onclick="playerTurn()">擲骰子</button>
    </div>

    <script>
        const cities = [
            { name: "台北", x: 1, y: 0 }, { name: "宜蘭", x: 2, y: 0 },
            { name: "花蓮", x: 2, y: 1 }, { name: "台東", x: 2, y: 2 },
            { name: "屏東", x: 2, y: 3 }, { name: "高雄", x: 2, y: 4, thsr: true },
            { name: "台南", x: 1, y: 4 }, { name: "嘉義", x: 0, y: 4 },
            { name: "雲林", x: 0, y: 3 }, { name: "台中", x: 0, y: 2, thsr: true },
            { name: "苗栗", x: 0, y: 1 }, { name: "新竹", x: 0, y: 0 }
        ];

        // 棋子狀態：-1 表示在老家，0~11 表示在地圖上
        let gameState = {
            player: [-1, -1],
            ai: [-1, -1],
            isMoving: false
        };

        const board = document.getElementById('board');
        const status = document.getElementById('status');
        const rollBtn = document.getElementById('roll-btn');

        // 初始化棋盤
        cities.forEach((city, index) => {
            const cell = document.createElement('div');
            cell.className = `cell ${city.thsr ? 'thsr' : ''}`;
            cell.style.gridColumnStart = city.x + 1;
            cell.style.gridRowStart = city.y + 1;
            cell.innerHTML = `<span>${city.name}</span>`;
            cell.id = `cell-${index}`;
            board.appendChild(cell);
        });

        // 創建棋子
        const pieces = {
            p0: createPiece('🧋', 'player'),
            p1: createPiece('🧋', 'player'),
            a0: createPiece('🍍', 'ai'),
            a1: createPiece('🍍', 'ai')
        };

        function createPiece(emoji, className) {
            const div = document.createElement('div');
            div.className = `piece ${className}`;
            div.innerText = emoji;
            document.body.appendChild(div);
            return div;
        }

        function closeModal() {
            document.getElementById('rule-modal').style.display = 'none';
            updatePiecePositions();
        }

        function updatePiecePositions() {
            // 玩家棋子在下方，電腦在上方
            renderPiece(pieces.p0, gameState.player[0], 0, 'player');
            renderPiece(pieces.p1, gameState.player[1], 1, 'player');
            renderPiece(pieces.a0, gameState.ai[0], 0, 'ai');
            renderPiece(pieces.a1, gameState.ai[1], 1, 'ai');
        }

        function renderPiece(el, pos, offset, type) {
            if (pos === -1) {
                // 在老家
                const baseLeft = type === 'player' ? window.innerWidth/2 - 80 : window.innerWidth/2 + 40;
                const baseTop = 550;
                el.style.left = `${baseLeft + (offset * 40)}px`;
                el.style.top = `${baseTop}px`;
            } else {
                const cell = document.getElementById(`cell-${pos}`);
                const rect = cell.getBoundingClientRect();
                el.style.left = `${rect.left + 5 + (offset * 10)}px`;
                el.style.top = `${rect.top + 5}px`;
            }
        }

        async function moveStepByStep(type, pieceIdx, steps) {
            for (let i = 0; i < steps; i++) {
                if (gameState[type][pieceIdx] === -1) {
                    gameState[type][pieceIdx] = 0; // 出發
                } else {
                    gameState[type][pieceIdx] = (gameState[type][pieceIdx] + 1);
                }
                
                // 檢查是否贏了 (繞完 12 格)
                if (gameState[type][pieceIdx] >= 12) {
                    updatePiecePositions();
                    alert(type === 'player' ? "🎉 你環島成功了！玩家獲勝！" : "🤖 電腦先環島完畢了！");
                    location.reload();
                    return false;
                }

                updatePiecePositions();
                await new Promise(r => setTimeout(r, 300));
            }

            // 檢查高鐵加速
            const currentPos = gameState[type][pieceIdx];
            if (cities[currentPos].thsr) {
                status.innerText = "🚄 衝啊！高鐵加速中！";
                await new Promise(r => setTimeout(r, 500));
                return await moveStepByStep(type, pieceIdx, 3);
            }

            // 檢查碰撞 (Kick)
            const opponent = type === 'player' ? 'ai' : 'player';
            gameState[opponent].forEach((pos, idx) => {
                if (pos === gameState[type][pieceIdx] && pos !== -1) {
                    status.innerText = "💥 哎呀！撞到了！";
                    gameState[opponent][idx] = -1;
                }
            });
            updatePiecePositions();
            return true;
        }

        async function playerTurn() {
            if (gameState.isMoving) return;
            gameState.isMoving = true;
            rollBtn.disabled = true;

            const die = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice-result').innerText = ['🎲','⚀','⚁','⚂','⚃','⚄','⚅'][die];
            status.innerText = `你擲出了 ${die} 點`;

            // 簡單策略：優先移動已經在路上的棋子，否則移動第一顆
            let pIdx = gameState.player[0] !== -1 ? 0 : (gameState.player[1] !== -1 ? 1 : 0);
            
            const alive = await moveStepByStep('player', pIdx, die);
            
            if (alive) {
                setTimeout(aiTurn, 1000);
            }
        }

        async function aiTurn() {
            status.innerText = "🤖 電腦思考中...";
            const die = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice-result').innerText = ['🎲','⚀','⚁','⚂','⚃','⚄','⚅'][die];
            
            let aIdx = gameState.ai[0] !== -1 ? 0 : (gameState.ai[1] !== -1 ? 1 : 0);
            await moveStepByStep('ai', aIdx, die);

            status.innerText = "換你了！";
            gameState.isMoving = false;
            rollBtn.disabled = false;
        }

        window.onresize = updatePiecePositions;
    </script>
</body>
</html>
