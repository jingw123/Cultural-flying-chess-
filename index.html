<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大學面試錄取挑戰賽</title>
    <style>
        :root {
            --navy: #1a237e;
            --gold: #fbc02d;
            --white: #ffffff;
            --gray: #f5f5f5;
            --success: #2e7d32;
        }
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #0d1117;
            color: var(--white);
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 20px; min-height: 100vh;
        }
        /* 面試視窗 */
        #interview-room {
            width: 100%; max-width: 600px;
            background: var(--navy); border: 4px solid #30363d;
            border-radius: 15px; overflow: hidden; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        /* 教授區域 */
        #professor-area {
            height: 250px; background: linear-gradient(transparent, rgba(0,0,0,0.5)), #283593;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }
        #professor-avatar { font-size: 80px; margin-bottom: 10px; }
        #professor-name { background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; font-size: 14px; }
        
        /* 題目對話框 */
        #speech-bubble {
            background: var(--white); color: #333; padding: 15px;
            width: 80%; border-radius: 10px; margin: 15px auto;
            font-weight: bold; min-height: 50px; position: relative;
        }
        /* 倒數計時條 */
        #timer-bar-container { width: 100%; height: 8px; background: #1b212c; }
        #timer-bar { width: 100%; height: 100%; background: var(--gold); transition: width 0.1s linear; }

        /* 選項區 */
        #options-area { padding: 20px; background: var(--gray); display: flex; flex-direction: column; gap: 10px; }
        .option-btn {
            background: white; border: 2px solid #ddd; padding: 12px 20px;
            border-radius: 8px; cursor: pointer; color: #333; font-size: 16px;
            text-align: left; transition: 0.2s;
        }
        .option-btn:hover { border-color: var(--navy); background: #e8eaf6; }

        /* 評等顯示 */
        #result-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none;
            flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        #grade-display { font-size: 80px; font-weight: bold; margin-bottom: 10px; }
        #feedback-text { font-size: 18px; margin-bottom: 20px; text-align: center; padding: 0 20px; }
        
        button#next-btn {
            background: var(--gold); border: none; padding: 10px 30px;
            font-size: 18px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }

        .score-board { margin-top: 20px; font-size: 18px; color: var(--gold); }
    </style>
</head>
<body>

    <h2 style="letter-spacing: 2px;">🎓 大學面試錄取挑戰賽</h2>
    
    <div id="interview-room">
        <div id="timer-bar-container"><div id="timer-bar"></div></div>

        <div id="professor-area">
            <div id="professor-avatar">👨‍🏫</div>
            <div id="professor-name">首席面試官：張教授</div>
            <div id="speech-bubble">準備好了嗎？請點擊下方開始面試。</div>
        </div>

        <div id="options-area">
            <button class="option-btn" onclick="startGame()">我準備好了，教授您好。</button>
        </div>

        <div id="result-overlay">
            <div id="grade-display">A+</div>
            <div id="feedback-text">評語內容</div>
            <button id="next-btn" onclick="nextQuestion()">繼續下一題</button>
        </div>
    </div>

    <div class="score-board">當前總積分：<span id="total-score">0</span></div>

    <script>
        const quizBank = [
            {
                q: "請先簡單介紹你自己，為什麼想申請本系？",
                options: [
                    { t: "我從小就很喜歡這個領域，希望能進入貴校深造，提升專業能力。", score: 3, level: "專業" },
                    { t: "因為我的分數剛好到這裡，而且聽說貴校的名聲很好。", score: 1, level: "不專業" },
                    { t: "我覺得貴系很有趣，希望能跟教授學習更多知識。", score: 2, level: "普通" }
                ]
            },
            {
                q: "如果你在團體合作中遇到意見不合，你會如何處理？",
                options: [
                    { t: "我會先聆聽大家的看法，尋找共同點，並理性討論最合適的方案。", score: 3, level: "專業" },
                    { t: "我會堅持自己的想法，因為我對自己的判斷有信心。", score: 1, level: "不專業" },
                    { t: "我會請老師來決定，這樣比較公平。", score: 2, level: "普通" }
                ]
            },
            {
                q: "在未來的學習計畫中，你最想克服的挑戰是什麼？",
                options: [
                    { t: "我希望透過專題研究，將理論與實務結合，解決複雜的產業問題。", score: 3, level: "專業" },
                    { t: "我希望學分都能過，不要被當掉就好。", score: 1, level: "不專業" },
                    { t: "我希望能多參加社團，交到更多志同道合的朋友。", score: 2, level: "普通" }
                ]
            }
        ];

        let currentIdx = 0;
        let score = 0;
        let timer;
        let startTime;
        let timeLeft = 15;

        function startGame() {
            currentIdx = 0;
            score = 0;
            updateScore();
            showQuestion();
        }

        function showQuestion() {
            const quiz = quizBank[currentIdx];
            document.getElementById('speech-bubble').innerText = quiz.q;
            document.getElementById('result-overlay').style.display = 'none';
            
            const area = document.getElementById('options-area');
            area.innerHTML = '';
            
            quiz.options.sort(() => Math.random() - 0.5).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.t;
                btn.onclick = () => handleAnswer(opt);
                area.appendChild(btn);
            });

            startTimer();
        }

        function startTimer() {
            timeLeft = 15;
            startTime = Date.now();
            const bar = document.getElementById('timer-bar');
            
            clearInterval(timer);
            timer = setInterval(() => {
                timeLeft -= 0.1;
                bar.style.width = (timeLeft / 15 * 100) + '%';
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    handleAnswer({ score: 0, level: "逾時" });
                }
            }, 100);
        }

        function handleAnswer(opt) {
            clearInterval(timer);
            const responseTime = (Date.now() - startTime) / 1000;
            let grade = '';
            let feedback = '';
            
            if (opt.level === "專業") {
                if (responseTime < 7) { grade = 'A+'; feedback = '反應靈敏且專業，令我印象深刻！'; score += 50; }
                else { grade = 'A'; feedback = '回答很成熟，但反應速度可以再快一點。'; score += 40; }
            } else if (opt.level === "普通") {
                grade = 'B+'; feedback = '回答中規中矩，建議加入更多專業術語。'; score += 20;
            } else if (opt.level === "逾時") {
                grade = 'F'; feedback = '面試中保持沉默是大忌，請注意時間分配。';
            } else {
                grade = 'F'; feedback = '這個回答不夠專業，可能無法展現你的入學動機。';
            }

            document.getElementById('grade-display').innerText = grade;
            document.getElementById('grade-display').style.color = (grade === 'F') ? '#ff5252' : '#69f0ae';
            document.getElementById('feedback-text').innerText = feedback;
            document.getElementById('result-overlay').style.display = 'flex';
            
            updateScore();
        }

        function updateScore() {
            document.getElementById('total-score').innerText = score;
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < quizBank.length) {
                showQuestion();
            } else {
                document.getElementById('speech-bubble').innerText = "面試結束，我們會再通知你結果！";
                document.getElementById('result-overlay').innerHTML = `
                    <h2 style="color:var(--gold)">最終面試成績：${score}</h2>
                    <button id="next-btn" onclick="location.reload()">重新挑戰</button>
                `;
                document.getElementById('result-overlay').style.display = 'flex';
            }
        }
    </script>
</body>
</html>
