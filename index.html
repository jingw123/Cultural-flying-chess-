<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面試大冒險：生存挑戰</title>
    <style>
        :root { --深藍: #1a1a2e; --金: #f1c40f; --白: #ecf0f1; --紅: #e74c3c; --綠: #2ecc71; }
        body { background: #0f0f1a; color: var(--白); font-family: "Microsoft JhengHei", sans-serif; display: flex; justify-content: center; padding: 10px; margin: 0; height: 100vh; overflow: hidden; }
        #遊戲視窗 { width: 100%; max-width: 500px; height: 95vh; background: var(--深藍); border: 4px solid var(--金); border-radius: 15px; display: flex; flex-direction: column; position: relative; }
        
        /* 狀態欄 */
        #狀態欄 { display: flex; justify-content: space-around; background: #16213e; padding: 10px; border-bottom: 2px solid var(--金); font-size: 14px; }
        .屬性 { text-align: center; }
        .數值 { display: block; font-size: 20px; font-weight: bold; color: var(--金); }

        /* 教授區 */
        #對話區 { flex-grow: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #教授頭像 { font-size: 80px; transition: transform 0.3s; }
        #教授名稱 { font-size: 18px; color: #aaa; margin: 10px 0; }
        #對話文字 { font-size: 22px; font-weight: bold; line-height: 1.5; min-height: 100px; }

        /* 選項區 */
        #選項區 { padding: 15px; background: #0f3460; border-radius: 20px 20px 0 0; }
        .選項按鈕 { width: 100%; padding: 12px; margin-bottom: 10px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; background: var(--白); color: var(--深藍); text-align: left; }
        .選項按鈕:hover { transform: scale(1.02); background: var(--金); }

        /* 結算層 */
        #結算層 { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px; }
        h2 { font-size: 40px; color: var(--金); }
    </style>
</head>
<body>

<div id="遊戲視窗">
    <div id="狀態欄">
        <div class="屬性">耐心值<span class="數值" id="耐心值">100</span></div>
        <div class="屬性">專業度<span class="數值" id="專業度">0</span></div>
        <div class="屬性">好感度<span class="數值" id="好感度">0</span></div>
    </div>

    <div id="對話區">
        <div id="教授頭像">👴</div>
        <div id="教授名稱">林教授</div>
        <div id="對話文字">準備好開始這場生死面試了嗎？</div>
        <div id="提示小字" style="color:var(--金); margin-top:10px; font-size:14px;"></div>
    </div>

    <div id="選項區">
        <button class="選項按鈕" onclick="遊戲開始()">【 進入考場 】</button>
    </div>

    <div id="結算層">
        <h2 id="結算標題">面試結果</h2>
        <div id="結算評語" style="font-size: 18px; line-height: 1.6; margin: 20px 0;"></div>
        <button class="選項按鈕" onclick="location.reload()" style="text-align:center">重新挑戰</button>
    </div>
</div>

<script>
    let 狀態 = { 耐心: 100, 專業: 0, 好感: 0, 題數: 0 };
    let 當前教授 = { 名稱: "林教授", 語速: 0.65, pitch: 0.6 };

    const 劇本 = [
        { 問: "「我看你資料寫得很精彩，但...你真的適合我們系嗎？」", 選: [
            { t: "「我做過很多專題，我的能力絕對能滿足學系需求。」", p: 20, f: 5, n: -5, r: "口氣很大喔，我看你專題做什麼..." },
            { t: "「我也還在摸索，但我覺得貴系的環境我很喜歡。」", p: 5, f: 20, n: 0, r: "很誠實，年輕人就是要有這種親和力。" },
            { t: "「其實我是被爸媽逼來的，但我會努力讀完。」", p: -10, f: -10, n: -30, r: "（教授臉色一沉）那你現在可以回去了。" }
        ]},
        { 問: "「如果你進來後發現同學都比你強，你會有什麼感覺？」", 選: [
            { t: "「我會把他們當成目標，主動請教，直到我趕上為止。」", p: 15, f: 15, n: 0, r: "不錯，有鬥志！" },
            { t: "「沒關係，每個人都有自己的節奏，我走我的路。」", p: 10, f: 5, n: -5, r: "是有點淡定，但也怕你太沒競爭力。" },
            { t: "「那我就當墊底的就好，反正總有人要墊底。」", p: -20, f: -20, n: -40, r: "（教授開始滑手機）非常有『哲理』的回答呢。" }
        ]},
        { 問: "「(教授突然打斷) 欸，你覺得剛才門口那個噴水池漂亮嗎？」", 選: [
            { t: "「很漂亮，尤其是水流的設計很有藝術感。」", p: 0, f: 20, n: 5, r: "對吧！那是我想了好久的設計！" },
            { t: "「抱歉，我剛才專心在複習面試內容，沒注意到。」", p: 15, f: 0, n: 0, r: "真認真，不過偶爾要抬頭看世界啊。" },
            { t: "「我覺得很醜，水花都噴到我衣服了。」", p: 5, f: -30, n: -20, r: "那是本系引以為傲的標誌...算了。" }
        ]}
        // 可以持續增加更多奇怪的隨機題
    ];

    function 朗讀(文字) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(文字);
        msg.lang = 'zh-TW';
        msg.rate = 當前教授.語速;
        msg.pitch = 當前教授.pitch;
        window.speechSynthesis.speak(msg);
    }

    function 遊戲開始() {
        狀態.題數 = 0;
        更新狀態();
        下一題();
    }

    function 更新狀態() {
        document.getElementById('耐心值').innerText = 狀態.耐心;
        document.getElementById('專業度').innerText = 狀態.專業;
        document.getElementById('好感度').innerText = 狀態.好感;
        
        if (狀態.耐心 <= 30) {
            document.getElementById('耐心值').style.color = "var(--紅)";
            document.getElementById('教授頭像').innerText = "💢";
        }
    }

    function 下一題() {
        if (狀態.耐心 <= 0) { 結束(false); return; }
        if (狀態.題數 >= 劇本.length) { 結束(true); return; }

        let 題目 = 劇本[狀態.題數];
        document.getElementById('對話文字').innerText = 題目.問;
        朗讀(題目.問);

        let 選項區 = document.getElementById('選項區');
        選項區.innerHTML = "";
        題目.選.forEach(x => {
            let btn = document.createElement('button');
            btn.className = "選項按鈕";
            btn.innerText = x.t;
            btn.onclick = () => {
                狀態.專業 += x.p;
                狀態.好感 += x.f;
                狀態.耐心 += x.n;
                document.getElementById('提示小字').innerText = x.r;
                朗讀(x.r);
                狀態.題數++;
                更新狀態();
                setTimeout(下一題, 2500); // 給學生看評語的時間
            };
            選項區.appendChild(btn);
        });
    }

    function 結束(完成) {
        document.getElementById('結算層').style.display = "flex";
        let 標題 = document.getElementById('結算標題');
        let 評語 = document.getElementById('結算評語');

        if (!完成 || 狀態.耐心 <= 0) {
            標題.innerText = "面試失敗";
            標題.style.color = "var(--紅)";
            評語.innerHTML = "你把教授的耐心耗盡了！教授直接叫保全把你請了出去。<br>建議：回答不要太直白，也要觀察面試官的情緒。";
        } else {
            let 總分 = 狀態.專業 + 狀態.好感;
            if (總分 >= 60) {
                標題.innerText = "正式錄取！";
                評語.innerHTML = `專業：${狀態.專業} / 好感：${狀態.好感}<br>你是教授眼中的明日之星！他們甚至想幫你申請獎學金。`;
            } else if (總分 >= 30) {
                標題.innerText = "進入備取";
                評語.innerHTML = `專業：${狀態.專業} / 好感：${狀態.好感}<br>表現穩定但沒亮點。教授說：『還可以，先放在名單裡看看吧。』`;
            } else {
                標題.innerText = "未錄取";
                評語.innerHTML = `專業：${狀態.專業} / 好感：${狀態.好感}<br>你安全下莊了，但教授轉頭就忘記你是誰。下次要更有記憶點！`;
            }
        }
    }
</script>
</body>
</html>
