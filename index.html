<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大學面試口語挑戰賽</title>
    <style>
        :root { --深藍: #1a237e; --金: #ffd700; --白: #ffffff; --背景: #0d1117; }
        body { 
            background: var(--背景); color: var(--白); 
            font-family: "Microsoft JhengHei", sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px; margin: 0;
        }
        #面試室 { 
            width: 100%; max-width: 550px; background: var(--深藍); 
            border-radius: 12px; overflow: hidden; position: relative; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }
        #計時條外框 { width: 100%; height: 10px; background: #222; }
        #計時條 { width: 100%; height: 100%; background: #ff4757; transition: width 0.1s linear; }
        
        #教授區 { 
            height: 240px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; background: #283593; padding: 10px;
        }
        #教授頭像 { font-size: 70px; margin-bottom: 5px; }
        #對話框 { 
            background: white; color: #111; padding: 15px; 
            width: 85%; border-radius: 10px; font-weight: bold; line-height: 1.5;
            min-height: 50px; font-size: 16px;
        }

        #選項區 { padding: 20px; background: #f0f0f0; display: flex; flex-direction: column; gap: 10px; }
        .選項按鈕 { 
            background: white; border: 1.5px solid #ccc; padding: 14px; 
            border-radius: 8px; cursor: pointer; text-align: left; 
            font-size: 15px; color: #333; transition: 0.2s;
        }
        .選項按鈕:hover { border-color: var(--深藍); background: #e8eaf6; }

        #結果層 { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); display: none; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        #等第 { font-size: 90px; font-weight: bold; color: var(--金); }
        #評語 { padding: 20px; font-size: 17px; line-height: 1.4; color: #eee; text-align: center; }
        #繼續按鈕 { 
            background: var(--金); color: #000; border: none; padding: 10px 40px; 
            font-size: 18px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 20px;">🎓 大學面試：錄取大挑戰</h2>
    
    <div id="面試室">
        <div id="計時條外框"><div id="計時條"></div></div>
        <div id="教授區">
            <div id="教授頭像">👨‍🏫</div>
            <div id="對話框">你好，我是今天的面試官。準備好了嗎？</div>
        </div>
        <div id="選項區">
            <button class="選項按鈕" onclick="遊戲開始()">【 點我開始面試 】</button>
        </div>
        
        <div id="結果層">
            <div id="等第">A+</div>
            <div id="評語">內容</div>
            <button id="繼續按鈕" onclick="下一題()">繼續下一題</button>
        </div>
    </div>

    <script>
        const 題目庫 = [
            {
                問: "第一題：請先簡單介紹你自己。你為什麼會想來申請我們系呢？",
                選: [
                    {內容: "我一直對這個領域很有興趣，也看過貴系的網頁，覺得這裡的課很適合我。", 評價: "A", 評語: "回答得很大方，看得出來有做功課！"},
                    {內容: "因為這間學校很有名，大家都說考進這裡以後工作會比較好找。", 評價: "B", 評語: "有點太直白了，教授會希望你多聊聊對學習的熱情。"},
                    {內容: "我其實還沒想好，只是跟著朋友一起報名看看。", 評價: "F", 評語: "這樣回答教授會覺得你完全沒準備喔。"}
                ]
            },
            {
                問: "第二題：如果你跟同學分組做報告，有人不幫忙，你會怎麼處理？",
                選: [
                    {內容: "我會先私下問他是不是有困難，大家再重新分工，把報告準時做完。", 評價: "A", 評語: "很有團隊精神，懂得主動解決問題！"},
                    {內容: "我會直接去跟老師說他不認真，請老師扣他的分數。", 評價: "F", 評語: "這樣太衝動了，建議先試著跟同學溝通。"},
                    {內容: "沒關係，我自己做完就好了，反正把分數拿到比較重要。", 評價: "B", 評語: "雖然你很負責任，但要學著跟別人溝通才行。"}
                ]
            },
            {
                問: "第三題：你覺得自己最大的優點是什麼？",
                選: [
                    {內容: "我覺得我很負責任，只要是我答應要做的事，我一定會想辦法完成。", 評價: "A", 評語: "這是一個很好的優點，教授很喜歡負責的學生。"},
                    {內容: "我很聰明，學習速度比別人都快，考試對我來說一點都不難。", 評價: "B", 評語: "很有自信，但可以再謙虛一點會更好。"},
                    {內容: "我好像沒什麼優點，就是一個普通的學生。", 評價: "F", 評語: "面試就是要展現優點，要對自己有信心一點！"}
                ]
            },
            {
                問: "第四題：進入大學後，你打算怎麼安排你的生活？",
                選: [
                    {內容: "我會先努力把專業課學好，有時間再去參加社團或打工，練習獨立。", 評價: "A", 評語: "聽起來很踏實，目標很清楚！"},
                    {內容: "我想多玩一點，參加很多活動，功課只要能及格順利畢業就好。", 評價: "B", 評語: "大學生活雖然好玩，但學習還是最重要的喔。"},
                    {內容: "我還沒想那麼遠，等進來讀了再說吧。", 評價: "F", 評語: "建議先有一個大概的計畫，教授才覺得你有心。"}
                ]
            },
            {
                問: "第五題：如果你在學習上遇到聽不懂的內容，你會怎麼辦？",
                選: [
                    {內容: "我會先上網找資料，還是不懂的話，會去請教老師或跟同學討論。", 評價: "A", 評語: "主動學習的態度非常好，這是大學最需要的！"},
                    {內容: "我會放在一邊，等快要考試的時候再去補習或是死背起來。", 評價: "F", 評語: "這樣學習效果會很差，要趕快改掉喔。"},
                    {內容: "我會去問學長姊，請他們直接告訴我答案比較快。", 評價: "B", 評語: "問別人是好事，但要先自己思考過。"}
                ]
            },
            {
                問: "第六題：你最近有看過什麼印象深刻的新聞或書嗎？聊聊看。",
                選: [
                    {內容: "我最近看到關於環境保護的新聞，覺得跟我們以後的生活很有關係。", 評價: "A", 評語: "很棒，有在關心社會發生的事情！"},
                    {內容: "我最近都在看網紅的影片，覺得很好笑，可以舒緩壓力。", 評價: "B", 評語: "這也可以，但面試時可以選一些更有深度的話題。"},
                    {內容: "我最近都在讀書，沒時間看新聞或其他的東西。", 評價: "F", 評語: "面試官會希望你多接觸外界的資訊。"}
                ]
            },
            {
                問: "第七題：如果你同時考上兩間不錯的大學，你會怎麼選？",
                選: [
                    {內容: "我會看哪一間的環境跟資源對我的未來更有幫助，再做決定。", 評價: "A", 評語: "分析得很冷靜，很有想法！"},
                    {內容: "我看哪一間比較近或是哪一間的學費比較便宜就去哪間。", 評價: "B", 評語: "這也是現實考量，但可以多聊聊教學資源。"},
                    {內容: "不知道，到時候問我爸媽，聽他們的意見就好。", 評價: "F", 評語: "你已經要讀大學了，要有自己的判斷力喔。"}
                ]
            },
            {
                問: "第八題：你覺得自己在什麼時候會感到最有壓力？怎麼解決？",
                選: [
                    {內容: "事情很多的時候會覺得累，我會去運動或聽音樂來放鬆，然後排好計畫。", 評價: "A", 評語: "能調節壓力又懂管理時間，非常好！"},
                    {內容: "快要考試的時候壓力很大，我會一直吃東西或是睡覺來逃避。", 評價: "F", 評語: "逃避不是好辦法，要學著面對它。"},
                    {內容: "我會跟朋友抱怨或是大哭一場，心情變好後再繼續努力。", 評價: "B", 評語: "這也是一種排解方式，但要注意解決問題。"}
                ]
            },
            {
                問: "第九題：你希望大學畢業後的自己變成什麼樣的人？",
                選: [
                    {內容: "我希望我能變成一個專業的人，可以用學到的知識去幫助別人。", 評價: "A", 評語: "這個目標非常有意義，加油！"},
                    {內容: "我希望能找到一份薪水很高的工作，買好車好房子過生活。", 評價: "B", 評語: "很誠實，但教授更想聽聽你的職涯目標。"},
                    {內容: "我沒想過這件事，只想先把這四年過完。", 評價: "F", 評語: "對未來沒想法會讓教授有點擔心你的動力。"}
                ]
            },
            {
                問: "最後一題：如果我們最後沒有錄取你，你會覺得很難過嗎？",
                選: [
                    {內容: "我會難過，但也會反思自己哪裡做得不夠好，再去挑戰其他的機會。", 評價: "A", 評語: "非常有韌性！這種心態一定會成功。"},
                    {內容: "會啊，這是我最想讀的系，如果沒上我可能就不想讀書了。", 評價: "F", 評語: "不要太極端，人生還有很多路可以走。"},
                    {內容: "沒關係，反正我也報名了其他學校，總會有一間會上吧。", 評價: "B", 評語: "雖然很淡定，但也要展現出對本系的重視喔。"}
                ]
            }
        ];

        let 目前索引 = 0, 遊戲計時器, 開始時間, 剩餘時間 = 15;

        function 朗讀(文字) {
            window.speechSynthesis.cancel();
            const 語音 = new SpeechSynthesisUtterance(文字);
            語音.lang = 'zh-TW'; 語音.rate = 0.8;
            window.speechSynthesis.speak(語音);
        }

        function 遊戲開始() {
            目前索引 = 0;
            顯示題目();
        }

        function 顯示題目() {
            const 題目 = 題目庫[目前索引];
            document.getElementById('對話框').innerText = 題目.問;
            document.getElementById('結果層').style.display = 'none';
            朗讀(題目.問);

            const 選項區 = document.getElementById('選項區');
            選項區.innerHTML = '';
            題目.選.forEach(選項 => {
                const 按鈕 = document.createElement('button');
                按鈕.className = '選項按鈕';
                按鈕.innerText = 選項.內容;
                按鈕.onclick = () => 處理回答(選項);
                選項區.appendChild(按鈕);
            });
            啟動計時();
        }

        function 啟動計時() {
            剩餘時間 = 15; 開始時間 = Date.now();
            clearInterval(遊戲計時器);
            遊戲計時器 = setInterval(() => {
                剩餘時間 -= 0.1;
                document.getElementById('計時條').style.width = (剩餘時間 / 15 * 100) + '%';
                if (剩餘時間 <= 0) { clearInterval(遊戲計時器); 朗讀("時間到了，請注意時間。"); 處理逾時(); }
            }, 100);
        }

        function 處理回答(選中項) {
            clearInterval(遊戲計時器);
            const 反應時間 = (Date.now() - 開始時間) / 1000;
            let 最終等第 = 選中項.評價;
            
            if (選中項.評價 === 'A' && 反應時間 < 7) 最終等第 = 'A+';
            if (選中項.評價 === 'B') 最終等第 = 'B+';

            document.getElementById('等第').innerText = 最終等第;
            document.getElementById('等第').style.color = (最終等第.includes('F')) ? '#ff5252' : '#ffd700';
            document.getElementById('評語').innerText = 選中項.評語;
            document.getElementById('結果層').style.display = 'flex';
            朗讀(`評價是 ${最終等第}。 ${選中項.評語}`);
        }

        function 處理逾時() {
            document.getElementById('等第').innerText = 'F';
            document.getElementById('評語').innerText = "你發呆太久了，面試官不喜歡不回答的學生。";
            document.getElementById('結果層').style.display = 'flex';
        }

        function 下一題() {
            目前索引++;
            if (目前索引 < 題目庫.length) 顯示題目();
            else {
                朗讀("面試結束了，辛苦你了！");
                document.getElementById('結果層').innerHTML = `
                    <h2 style="color:var(--金)">面試結束</h2>
                    <p style="padding:20px; color:white;">你已經完成了所有題目！辛苦了！</p>
                    <button id="繼續按鈕" onclick="location.reload()">重新開始</button>
                `;
            }
        }
    </script>
</body>
</html>
