<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台南校外教學：文化挑戰</title>
    <style>
        :root { --bg: #faf3e0; --tainan-red: #b71c1c; --ladder: #f1c40f; --snake: #e74c3c; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; }
        h2 { color: var(--tainan-red); margin: 10px 0; }
        
        /* 遊戲外框：固定比例避免白屏 */
        #board-container {
            position: relative; width: 350px; height: 500px;
            background: #fff; border: 8px solid var(--tainan-red); border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow: hidden;
        }

        /* 36 格網格佈局 */
        #game-board {
            display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(6, 1fr);
            width: 100%; height: 100%; gap: 2px; padding: 5px; box-sizing: border-box;
        }

        .cell {
            background: #fff; border: 1px solid #eee; display: flex; flex-direction: column;
            justify-content: center; align-items: center; font-size: 10px; font-weight: bold;
            text-align: center; color: #444; position: relative;
        }
        .cell.start { background: #ff7675; color: white; }
        .cell.end { background: var(--tainan-red); color: gold; border: 2px double gold; }

        #svg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        /* 棋子樣式 */
        #player-token {
            width: 35px; height: 35px; position: absolute; z-index: 100; font-size: 28px;
            display: flex; justify-content: center; align-items: center; pointer-events: none;
            transition: all 0.4s ease;
        }

        /* 控制區與彈窗 */
        .controls { margin-top: 15px; text-align: center; background: white; padding: 10px; border-radius: 20px; width: 320px; }
        button#roll-btn { background: var(--tainan-red); color: white; border: none; padding: 10px 40px; font-size: 18px; border-radius: 50px; cursor: pointer; }
        #modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .quiz-box { background: white; padding: 20px; border-radius: 20px; width: 80%; border: 5px solid var(--tainan-red); }
        .opt { display: block; width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; text-align: left; }
    </style>
</head>
<body>

    <h2>🏛️ 台南校外教學：文化挑戰</h2>
    
    <div style="margin-bottom: 10px;">
        選擇棋子：
        <select id="char-select" onchange="document.getElementById('player-token').innerText = this.value">
            <option value="🩴">🩴 藍白拖鞋</option>
            <option value="🏮">🏮 文創天燈</option>
            <option value="🌙">🌙 聖杯擲筊</option>
        </select>
    </div>

    <div id="board-container">
        <svg id="svg-layer"></svg>
        <div id="game-board"></div>
        <div id="player-token">🩴</div>
    </div>

    <div class="controls">
        <div id="dice-result" style="font-size: 40px;">🎲</div>
        <button id="roll-btn" onclick="play()">擲骰子移動</button>
        <p id="status" style="font-size: 12px; color: #666;">目標：從車站走到孔廟！</p>
    </div>

    <div id="modal">
        <div class="quiz-box">
            <h3 id="q-title" style="color:var(--tainan-red); margin-top:0;">文化挑戰題目</h3>
            <p id="q-text" style="font-weight:bold;"></p>
            <div id="q-opts"></div>
        </div>
    </div>
