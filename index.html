<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣環島飛行棋</title>
    <style>
        :root {
            --primary: #2c3e50;
            --player-color: #e74c3c;
            --ai-color: #3498db;
            --thsr-color: #f39c12;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f2f5;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
        }

        #rule-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 15px;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .game-container {
            position: relative;
            display: grid;
            grid-template-columns: repeat(3, 90px);
            grid-template-rows: repeat(5, 70px);
            gap: 8px;
            margin: 20px auto;
            background: #ddd;
            padding: 10px;
            border-radius: 10px;
        }

        .cell {
            background: white;
            border: 1px solid #bbb;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }

        .cell.thsr { background-color: #fff3e0; border: 2px solid var(--thsr-color); color: var(--thsr-color); }

        .piece {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            position: absolute;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            pointer-events: none;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
        }
        .piece.player { background: var(--player-color); border: 2px solid white; }
        .piece.ai { background: var(--ai-color); border: 2px solid white; }

        .home-area {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            padding: 10px;
            background: #eee;
            border-radius: 10px;
            min-height: 40px;
            width: 280px;
            justify-content: center;
        }

        .controls { text-align: center; margin-top: 10px; }
        button {
            padding: 12px 40px;
            font-size: 18px;
            cursor: pointer;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 4px 0 #1a252f;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #1a252f; }
        button:disabled { background: #95a5a6; box-shadow: none; }
    </style>
</head>
<body>

    <div id="rule-modal">
        <div class="modal-content">
            <h2>🚄 台灣環島飛行棋</h2>
            <p>1️⃣ 你的角色：🧋 珍奶<br>2️⃣ 隨便擲幾點都能出發<br>3️⃣ 踩到對方會踢回起點<br>4️⃣ 繞完一圈回到台北就贏了！</p>
            <button onclick="startGame()">我知道了，開始！</button>
        </div>
    </div>

    <h1>台灣大冒險</h1>
    <div id="status">點擊下方按鈕開始</div>

    <div class="game-container" id="board">
        </div>

    <div class="home-area" id="player-home">玩家老家：</div>
    <div class="home-area" id="ai-home">電腦老家：</div>

    <div class="controls">
        <div id="dice-result" style="font-size: 50px; margin: 10px;">🎲</div>
        <button id="roll-btn" onclick="playerTurn()" disabled>擲骰子</button>
    </div>

    <script>
        const cities = [
            { name: "台北", x: 1, y: 0 }, { name: "宜蘭", x: 2, y: 0 },
            { name: "花蓮", x: 2, y: 1 }, { name: "台東", x: 2, y: 2 },
            { name: "屏東", x: 2, y: 3 }, { name: "高雄", x: 2, y: 4, thsr: true },
            { name: "台南", x: 1, y: 4 }, { name: "嘉義", x: 0, y: 4 },
            { name: "雲林", x: 0, y: 3 }, { name: "台中", x: 0, y: 2, thsr: true },
            { name: "苗栗", x: 0, y: 1 }, { name: "新竹", x: 0, y: 0 }
        ];

        let gameState = {
            player: [-1, -1],
            ai: [-1, -1],
            isMoving: false
        };

        // 初始化
        const board = document.getElementById('board');
        cities.forEach((city, i) => {
            const div = document.createElement('div');
            div.className = `cell ${city.thsr ? 'thsr' : ''}`;
            div.style.gridColumnStart = city.x + 1;
            div.style.gridRowStart = city.y + 1;
            div.id = `cell-${i}`;
            div.innerHTML = `<span>${city.name}</span>`;
            board.appendChild(div);
        });

        const pieces = {
            p0: document.createElement('div'), p1: document.createElement('div'),
            a0: document.createElement('div'), a1: document.createElement('div')
        };

        Object.keys(pieces).forEach(k => {
            pieces[k].className = `piece ${k[0] === 'p' ? 'player' : 'ai'}`;
            pieces[k].innerText = k[0] === 'p' ? '🧋' : ' Pineapple 🍍';
            pieces[k].innerText = k[0] === 'p' ? '🧋' : '🍍';
            document.body.appendChild(pieces[k]);
        });

        function startGame() {
            document.getElementById('rule-modal').style.display = 'none';
            document.getElementById('roll-btn').disabled = false;
            document.getElementById('status').innerText = "你的回合，請擲骰子";
            updatePositions();
        }

        function updatePositions() {
            const homes = { p: document.getElementById('player-home'), a: document.getElementById('ai-home') };
            
            [0, 1].forEach(i => {
                setPos(pieces[`p${i}`], gameState.player[i], i, homes.p);
                setPos(pieces[`a${i}`], gameState.ai[i], i, homes.a);
            });
        }

        function setPos(el, posIdx, offset, homeEl) {
            if (posIdx === -1) {
                const rect = homeEl.getBoundingClientRect();
                el.style.left = `${rect.left + 80 + (offset * 40)}px`;
                el.style.top = `${rect.top + 10}px`;
            } else {
                const cell = document.getElementById(`cell-${posIdx % 12}`);
                const rect = cell.getBoundingClientRect();
                el.style.left = `${rect.left + 15 + (offset * 10)}px`;
                el.style.top = `${rect.top + 15}px`;
            }
        }

        async function movePiece(type, idx, steps) {
            for (let s = 0; s < steps; s++) {
                if (gameState[type][idx] === -1) gameState[type][idx] = 0;
                else gameState[type][idx]++;

                if (gameState[type][idx] >= 12) {
                    updatePositions();
                    setTimeout(() => { alert(type === 'player' ? "🏆 你贏了！台灣環島王！" : "💻 電腦贏了！下次再努力！"); location.reload(); }, 500);
                    return false;
                }
                updatePositions();
                await new Promise(r => setTimeout(r, 300));
            }

            // 檢查高鐵
            const finalPos = gameState[type][idx];
            if (cities[finalPos].thsr) {
                document.getElementById('status').innerText = "🚄 高鐵加速！前進3格！";
                await new Promise(r => setTimeout(r, 600));
                return await movePiece(type, idx, 3);
            }

            // 檢查踢人
            const opp = type === 'player' ? 'ai' : 'player';
            gameState[opp] = gameState[opp].map(p => (p === finalPos ? -1 : p));
            updatePositions();
            return true;
        }

        async function playerTurn() {
            if (gameState.isMoving) return;
            gameState.isMoving = true;
            document.getElementById('roll-btn').disabled = true;

            const roll = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice-result').innerText = ['🎲','⚀','⚁','⚂','⚃','⚄','⚅'][roll];
            
            // 優先移動最前面的棋子
            const pIdx = gameState.player[0] >= gameState.player[1] ? 0 : 1;
            const cont = await movePiece('player', pIdx, roll);
            
            if (cont) setTimeout(aiTurn, 1000);
        }

        async function aiTurn() {
            document.getElementById('status').innerText = "🤖 電腦擲骰中...";
            const roll = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice-result').innerText = ['🎲','⚀','⚁','⚂','⚃','⚄','⚅'][roll];
            
            const aIdx = gameState.ai[0] >= gameState.ai[1] ? 0 : 1;
            await movePiece('ai', aIdx, roll);

            document.getElementById('status').innerText = "換你了！";
            gameState.isMoving = false;
            document.getElementById('roll-btn').disabled = false;
        }

        window.onresize = updatePositions;
    </script>
</body>
</html>
