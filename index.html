    <title>台南校外教學：36格文化大冒險</title>
    <style>
        :root {
            --bg: #faf3e0;
            --land: #f5f5f5;
            --primary: #8d6e63;
            --ladder: #f1c40f;
            --snake: #e74c3c;
            --tainan-red: #b71c1c;
        }
        body { font-family: "Microsoft JhengHei", cursive, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        
        #game-board {
            position: relative; width: 360px; height: 550px;
            background: #fff; border: 10px solid var(--tainan-red); border-radius: 15px;
            display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(6, 1fr);
            gap: 4px; padding: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .cell {
            background: white; border: 1px solid #ddd; border-radius: 4px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-size: 10px; font-weight: bold; z-index: 10; text-align: center; color: #333;
        }
        .cell.start { background: #ff7675; color: white; }
        .cell.end { background: var(--tainan-red); color: gold; border: 3px double gold; font-size: 14px; }
        .cell.special { background: #fff9c4; }

        #svg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        .piece {
            width: 45px; height: 45px; position: absolute;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100; font-size: 32px; display: flex; justify-content: center; align-items: center;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2));
        }

        #modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
