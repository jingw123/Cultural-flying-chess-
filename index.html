<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣文化拼音冒險 - 蛇梯棋</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #fffbe6;
            --land: #e8f5e9;
            --primary: #2e7d32;
            --thsr: #f39c12;
            --trap: #e74c3c;
        }

        body {
            font-family: "Microsoft JhengHei", cursive, sans-serif;
            background-color: var(--bg);
            display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px;
        }

        /* 台灣島外框 */
        #taiwan-map {
            position: relative;
            width: 360px; height: 620px;
            background: var(--land);
            border: 5px solid #a5d6a7;
            border-radius: 40% 40% 45% 45% / 20% 20% 80% 80%;
            margin-top: 10px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 5px; padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .cell {
            background: rgba(255,255,255,0.8);
            border: 1px dashed #81c784;
            border-radius: 10px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-size: 12px; font-weight: bold; text-align: center;
            position: relative; z-index: 5;
        }

        .cell.start { background: #ffccbc; }
        .cell.end { background: #fff176; border: 2px solid gold; }
        
        /* 視覺化滑梯與梯子 */
        .line {
            position: absolute; border-radius: 10px; pointer-events: none; z-index: 2;
            opacity: 0.6; transform-origin: top left;
        }
        .line.ladder { background: var(--thsr); height: 6px; }
        .line.snake { background: var(--trap); height: 6px; }

        /* 棋子 */
        .piece {
            width: 40px; height: 40px; position: absolute;
            transition: all 0.5s ease-in-out; z-index: 100;
            display: flex; justify-content: center; align-items: center;
            font-size: 30px; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));
        }

        /* 彈窗 */
        #modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none;
            justify-content: center; align-items: center; z-index: 1000;
        }
        .quiz-box {
            background: white; padding: 25px; border-radius: 20px;
            width: 300px; text-align: center; border: 6px solid #4caf50;
        }
        .opt {
            display: block; width: 100%; padding: 12px; margin: 10px 0;
            border: 2px solid #ddd; border-radius: 10px; font-size: 18px; cursor: pointer;
        }
        .opt:hover { background: #f1f8e9; border-color: #4caf50; }

        .controls {
            margin-top: 15px; background: white; padding: 15px; border-radius: 20px;
            width: 340px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        #roll-btn {
            background: #4caf50; color: white; border: none; padding: 12px 50px;
            font-size: 20px; border-radius: 50px; cursor: pointer;
        }
        #roll-btn:disabled { background: #ccc; }
    </style>
</head>
<body>

    <h1 style="color: #2e7d32; margin: 5px;">📍 台灣拼音大冒險</h1>
    <div id="current-player" style="font-size: 18px; font-weight: bold; color: #e67e22;">
        請點擊「開始」選擇角色
    </div>

    <div id="taiwan-map">
        </div>

    <div class="controls">
        <div id="dice-val" style="font-size: 40px; margin-bottom: 5px;">🎲</div>
        <button id="roll-btn" onclick="takeTurn()">擲骰子移動</button>
        <div id="qrcode" style="display: flex; justify-content: center; margin-top: 10px;"></div>
    </div>

    <div id="modal">
        <div class="quiz-box">
            <h2 id="q-title" style="color: #2e7d32;">美食挑戰</h2>
            <p id="q-text" style="font-size: 18px;">請問這個拼音對嗎？</p>
            <div id="q-opts"></div>
        </div>
    </div>

    <script>
        const mapData = [
            { name: "墾丁" }, { name: "恆春" }, { name: "屏東" }, { name: "台東" },
            { name: "花蓮" }, { name: "宜蘭" }, { name: "基隆" }, { name: "台北" },
            { name: "新北" }, { name: "桃園" }, { name: "新竹" }, { name: "苗栗" },
            { name: "台中" }, { name: "彰化" }, { name: "南投" }, { name: "雲林" },
            { name: "嘉義" }, { name: "台南" }, { name: "高雄" }, { name: "阿里山" },
            { name: "日月潭" }, { name: "太魯閣" }, { name: "九份" }, { name: "淡水" },
            { name: "陽明山" }, { name: "西門町" }, { name: "士林夜市" }, { name: "台北101" }
        ];

        const questions = [
            { q: "珍珠奶茶", a: "Zhēnzhū Nǎichá", opts: ["Zhēnzhū Nǎichá", "Zēnzū Nǎicá", "Zhēnzhū Lǎichá"] },
            { q: "牛肉麵", a: "Niúròumiàn", opts: ["Niúròumiàn", "Liúròumiàn", "Niúlòumiàn"] },
            { q: "臭豆腐", a: "Chòudòufu", opts: ["Chòudòufu", "Còudòufu", "Chòudòuhǔ"] },
            { q: "小籠包", a: "Xiǎolóngbāo", opts: ["Xiǎolóngbāo", "Xiǎonóngbāo", "Siǎolóngbāo"] },
            { q: "滷肉飯", a: "Lǔròufàn", opts: ["Lǔròufàn", "Nǔròufàn", "Lǔlòufàn"] }
        ];

        // 特殊格：梯子(正) 與 蛇(負)
        const events = {
            2: { label: "🚄 高鐵特快：\n直達台中！", target: 12, type: 'ladder' },
            18: { label: "🚀 101直達：\n衝向終點！", target: 27, type: 'ladder' },
            10: { label: "🚥 國道塞車：\n退回新竹！", target: 4, type: 'snake' },
            22: { label: "🌧️ 九份大雨：\n滑回花蓮！", target: 5, type: 'snake' }
        };

        let playerPos = 0;
        let isMoving = false;
        const piece = document.createElement('div');
        piece.className = 'piece';
        piece.innerText = "🧋";

        function init() {
            const map = document.getElementById('taiwan-map');
            mapData.forEach((d, i) => {
                const cell = document.createElement('div');
                cell.className = `cell ${i===0?'start':''} ${i===27?'end':''}`;
                // S型排列邏輯
                let row = Math.floor(i / 4);
                let col = (row % 2 === 0) ? (i % 4) : (3 - (i % 4));
                cell.style.gridRow = 8 - row;
                cell.style.gridColumn = col + 1;
                cell.id = `c-${i}`;
                cell.innerHTML = `<span>${d.name}</span><div style="font-size:9px">${i+1}</div>`;
                map.appendChild(cell);
            });
            document.body.appendChild(piece);
            setTimeout(updatePiece, 500);
            new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 60, height: 60 });
        }

        function updatePiece() {
            const target = document.getElementById(`c-${playerPos}`);
            const rect = target.getBoundingClientRect();
            piece.style.left = `${rect.left + 5}px`;
            piece.style.top = `${rect.top + 5}px`;
        }

        async function takeTurn() {
            if (isMoving) return;
            isMoving = true;
            document.getElementById('roll-btn').disabled = true;

            const roll = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice-val').innerText = ['🎲','⚀','⚁','⚂','⚃','⚄','⚅'][roll];

            // 1. 移動
            for (let i = 0; i < roll; i++) {
                if (playerPos < 27) {
                    playerPos++;
                    updatePiece();
                    await new Promise(r => setTimeout(r, 400));
                }
            }

            // 2. 到達後必須答題
            await showQuiz();

            // 3. 檢查特殊事件 (梯子或蛇)
            if (events[playerPos]) {
                const ev = events[playerPos];
                alert(ev.label);
                playerPos = ev.target;
                updatePiece();
                await new Promise(r => setTimeout(r, 500));
            }

            if (playerPos >= 27) {
                alert("🎉 恭喜！你完成了台灣環島美食之旅！");
                location.reload();
            } else {
                isMoving = false;
                document.getElementById('roll-btn').disabled = false;
            }
        }

        function showQuiz() {
            return new Promise(resolve => {
                const quiz = questions[Math.floor(Math.random() * questions.length)];
                const modal = document.getElementById('modal');
                const opts = document.getElementById('q-opts');
                
                document.getElementById('q-title').innerText = `抵達 ${mapData[playerPos].name}！`;
                document.getElementById('q-text').innerText = `請選擇「${quiz.q}」的正確拼音：`;
                opts.innerHTML = '';
                modal.style.display = 'flex';

                quiz.opts.forEach(o => {
                    const btn = document.createElement('button');
                    btn.className = 'opt';
                    btn.innerText = o;
                    btn.onclick = () => {
                        if (o === quiz.a) {
                            alert("✅ 答對了！留在原地。");
                        } else {
                            alert(`❌ 答錯了！正確答案是 ${quiz.a}。退後 2 格！`);
                            playerPos = Math.max(0, playerPos - 2);
                            updatePiece();
                        }
                        modal.style.display = 'none';
                        resolve();
                    };
                    opts.appendChild(btn);
                });
            });
        }

        window.onload = init;
        window.onresize = updatePiece;
    </script>
</body>
</html>
