<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大學面試模擬器 - 專業版</title>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { width: 800px; background: white; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        #professor-area { background: #2c3e50; color: white; padding: 40px; text-align: center; min-height: 150px; }
        #professor-name { font-weight: bold; color: #bdc3c7; margin-bottom: 10px; }
        #question { font-size: 1.5rem; line-height: 1.6; }
        #options-area { padding: 30px; display: flex; flex-direction: column; gap: 15px; }
        .option-btn { background: #ecf0f1; border: 2px solid #bdc3c7; padding: 15px; font-size: 1.1rem; cursor: pointer; border-radius: 5px; transition: 0.3s; text-align: left; }
        .option-btn:hover { background: #3498db; color: white; border-color: #3498db; }
        #stats { display: flex; justify-content: space-around; background: #ecf0f1; padding: 15px; border-top: 1px solid #ddd; }
        .grade { font-size: 1.5rem; font-weight: bold; color: #e74c3c; }
        #feedback { text-align: center; padding: 20px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="professor-area">
        <div id="professor-name">首席面試官</div>
        <div id="question">正在載入面試試題...</div>
    </div>
    
    <div id="feedback"></div>

    <div id="options-area">
        </div>

    <div id="stats">
        <div>目前評價: <span id="current-grade" class="grade">-</span></div>
        <div>剩餘時間: <span id="timer" class="grade">15</span> 秒</div>
    </div>
</div>

<script>
    const questions = [
        { q: "請簡述申請本系的動機。", a: "我長期關注該領域趨勢，並希望結合貴校資源。", b: "因為這間學校名氣大，而且離我家很近。", f: "我媽覺得這個科系以後比較好找工作。", correct: 'a' },
        { q: "面對壓力時，你如何處理？", a: "我會制定優先順序，並透過運動保持心理韌性。", b: "我就努力讀書，盡量不要想太多。", f: "我會直接去睡覺或是玩遊戲來逃避。", correct: 'a' },
        { q: "你對本系課程有什麼了解？", a: "我研究過貴系的課程大綱，對實務實習特別感興趣。", b: "我大概知道要學什麼，就是一些專業課。", f: "內容應該跟高中學的差不多吧？", correct: 'a' }
    ];

    let currentIdx = 0;
    let timer;
    let timeLeft = 15;

    function startTimer() {
        clearInterval(timer);
        timeLeft = 15;
        document.getElementById('timer').innerText = timeLeft;
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) {
                endQuestion('F', "時間到，你太猶豫了。");
            }
        }, 1000);
    }

    function loadQuestion() {
        if (currentIdx >= questions.length) {
            document.getElementById('game-container').innerHTML = "<div style='padding:50px; text-align:center;'><h2>面試結束</h2><p>教授正在討論你的錄取結果...</p><button onclick='location.reload()'>重新面試</button></div>";
            return;
        }
        const qData = questions[currentIdx];
        document.getElementById('question').innerText = qData.q;
        const optionsArea = document.getElementById('options-area');
        optionsArea.innerHTML = "";
        
        const choices = [
            { text: qData.a, grade: 'A+' },
            { text: qData.b, grade: 'B' },
            { text: qData.f, grade: 'F' }
        ].sort(() => Math.random() - 0.5);

        choices.forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = c.text;
            btn.onclick = () => endQuestion(c.grade);
            optionsArea.appendChild(btn);
        });
        startTimer();
    }

    function endQuestion(grade, msg) {
        clearInterval(timer);
        let finalGrade = grade;
        if (grade === 'A+' && timeLeft < 8) finalGrade = 'A'; // 回答太慢降級
        
        document.getElementById('current-grade').innerText = finalGrade;
        alert("本題評價: " + finalGrade + (msg ? "\n" + msg : ""));
        currentIdx++;
        loadQuestion();
    }

    loadQuestion();
</script>

</body>
</html>
