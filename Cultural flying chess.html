<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣環島飛行棋 - 輕量版</title>
    <style>
        :root {
            --primary: #2c3e50;
            --player-color: #e74c3c;
            --ai-color: #3498db;
            --thsr-color: #f39c12;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }

        /* 遊戲說明彈窗 */
        #rule-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            text-align: center;
        }

        /* 棋盤佈局 */
        .game-container {
            position: relative;
            width: 320px;
            height: 480px;
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(5, 80px);
            gap: 10px;
            margin-top: 20px;
        }

        .cell {
            background: white;
            border: 2px solid #ccc;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            position: relative;
        }

        .cell.thsr {
            background-color: #fff3e0;
            border-color: var(--thsr-color);
            color: var(--thsr-color);
        }

        .cell.thsr::after { content: "🚄高鐵"; font-size: 10px; }

        /* 棋子樣式 */
        .piece {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            position: absolute;
            transition: all 0.3s ease;
            z-index: 10;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .piece.player { background: var(--player-color); border: 2px solid white; }
        .piece.ai { background: var(--ai-color); border: 2px solid white; }

        /* 控制面板 */
        .controls {
            margin-top: 30px;
            text-align: center;
        }

        button {
            padding: 10px 30px;
            font-size: 18px;
            cursor: pointer;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:disabled { background: #95a5a6; }

        #status {
            margin-top: 10px;
            font-weight: bold;
            height: 24px;
        }
    </style>
</head>
<body>

    <div id="rule-modal">
        <div class="modal-content">
            <h2>🚄 台灣環島飛行棋</h2>
            <ul style="text-align: left;">
                <li>你的角色：🧋 珍奶 (紅)</li>
                <li>電腦角色：🍍 鳳梨酥 (藍)</li>
                <li><b>起飛：</b>隨便擲幾點都能出發！</li>
                <li><b>高鐵：</b>停在橘色格子可額外前進 3 格。</li>
                <li><b>碰撞：</b>
