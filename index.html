<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大學面試特訓 - 專業版</title>
    <style>
        :root { --深藍: #001f3f; --金: #ffcc00; --白: #ffffff; --背景: #0a0a0a; --紅: #ff4136; --綠: #2ecc40; }
        body { 
            background: var(--背景); color: var(--白); 
            font-family: "Microsoft JhengHei", sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 5px; margin: 0; height: 100vh; overflow: hidden;
        }
        #容器 { 
            width: 98%; max-width: 600px; background: var(--深藍); 
            border: 3px solid var(--白); border-radius: 20px; 
            overflow: hidden; position: relative; margin-top: 5px;
            display: flex; flex-direction: column;
        }
        #計時外框 { width: 100%; height: 15px; background: #333; }
        #計時條 { width: 100%; height: 100%; background: var(--綠); transition: width 0.1s linear; }

        #面試官區 { padding: 15px; display: flex; flex-direction: column; align-items: center; background: #002b55; }
        #角色頭像 { font-size: 70px; margin-bottom: 5px; }
        #角色名稱 { color: var(--金); font-size: 22px; font-weight: bold; margin-bottom: 5px; }
        #對話框 { 
            background: white; color: #000; padding: 15px; width: 90%; 
            border-radius: 15px; font-weight: bold; line-height: 1.4; 
            font-size: 24px; min-height: 50px;
        }

        #選項區 { padding: 15px; background: #eee; display: flex; flex-direction: column; gap: 10px; flex-grow: 1; }
        .按鈕 { 
            background: white; border: 3px solid #444; padding: 12px 15px; 
            border-radius: 12px; cursor: pointer; text-align: left; 
            font-size: 20px; color: #000; font-weight: bold;
        }
        .按鈕:hover { background: var(--金); }

        #結果層 { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); display: none; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center;
        }
        #結果標題 { font-size: 60px; font-weight: 900; color: var(--金); }
        #結果評價 { font-size: 26px; color: var(--白); padding: 20px; line-height: 1.4; }
        .大按鈕 { background: var(--金); color: #000; border: none; padding: 15px 40px; font-size: 24px; border-radius: 10px; cursor: pointer; font-weight: 900; }
        #進度文字 { font-size: 18px; margin: 5px; color: var(--金); }
    </style>
</head>
<body>

    <h2 style="font-size: 28px; color: var(--金); margin: 5px 0;">🎓 大學面試特訓</h2>
    
    <div id="容器">
        <div id="計時外框"><div id="計時條"></div></div>
        <div id="面試官區">
            <div id="角色頭像">👋</div>
            <div id="角色名稱">面試系統</div>
            <div id="對話框">你好！準備好開始面試了嗎？請點擊下方按鈕進入。</div>
        </div>
        <div id="選項區">
            <button class="按鈕" onclick="遊戲開始()" style="text-align:center;">【 進入會場並開始 】</button>
        </div>
        
        <div id="結果層">
            <div id="結果標題">錄取</div>
            <div id="結果評價">評價內容</div>
            <button class="大按鈕" id="下一步按鈕" onclick="下一題()">點擊繼續</button>
        </div>
    </div>
    <div id="進度文字">等待面試中...</div>

    <script>
        const 面試官庫 = [
            { 名稱: "林教授", 頭像: "👴", 語速: 0.8, 嚴格度: 0.9, 語助詞: "哎呀，真不錯！", 結語: "保持這顆愛心喔。" },
            { 名稱: "張主任", 頭像: "👩‍💼", 語速: 0.9, 嚴格度: 1.2, 語助詞: "嗯... 聽起來很基本。", 結語: "專業度還有待提升。" },
            { 名稱: "王總裁", 頭像: "🤵", 語速: 1.0, 嚴格度: 1.1, 語助詞: "好，很有競爭力！", 結語: "效率才是王道。" }
        ];

        const 題目庫 = [
            { 問: "第一題：請簡單介紹你自己，為什麼報考我們系？", 選: [
                { t: "我對專業很有熱忱，且看過貴系網頁，非常認同課程安排。", s: "A", f: "這是一個標準且得體的回答。" },
                { t: "因為這間學校很有名，畢業後比較好找工作。", s: "B", f: "誠實是好事，但可以包裝得更專業一點。" },
                { t: "我其實還沒想好，只是跟著朋友一起報名看看。", s: "F", f: "這回答太隨便了，會讓人覺得你沒心。" }
            ]},
            { 問: "第二題：如果你跟組員吵架影響進度，你會怎麼辦？", 選: [
                { t: "我會先冷靜溝通，找出意見分歧點，主動找對方解決問題。", s: "A", f: "主動解決衝突，這是很棒的領導力。" },
                { t: "我會自己承擔大部分工作，雖然累但能確保報告準時完成。", s: "B", f: "很負責任，但要學會分配工作。" },
                { t: "我會直接拒絕跟他合作，或者請老師幫我換組。", s: "F", f: "遇到衝突就逃避，不是大學生該有的樣子。" }
            ]},
            { 問: "第三題：你覺得自己最大的優點是什麼？", 選: [
                { t: "我覺得我很負責任，只要答應的事，一定會努力完成。", s: "A", f: "教授最喜歡負責的學生，很加分。" },
                { t: "我很聰明，學習速度很快，考試對我來說很簡單。", s: "B", f: "有自信很好，但謙虛一點會更有親和力。" },
                { t: "我好像沒什麼優點，就是一個普通的學生。", s: "F", f: "面試就是要展現優點，別對自己沒信心。" }
            ]},
            { 問: "第四題：進入大學後，你打算如何安排你的學習生活？", 選: [
                { t: "我會以學業為重，並參加有意義的社團練習獨立。", s: "A", f: "計畫很踏實，目標非常明確。" },
                { t: "我想多打工賺錢，練習出社會之後需要的實戰能力。", s: "B", f: "打工不錯，但要注意課業平衡。" },
                { t: "我沒什麼具體計畫，大概就是走一步算一步吧。", s: "F", f: "缺乏規劃的人，很難在大學學好專業。" }
            ]},
            { 問: "第五題：如果你在學習上遇到一直解決不了的難題，你會怎麼辦？", 選: [
                { t: "我會先思考查資料，還是不懂就去請教老師或同學。", s: "A", f: "主動學習的態度是非常優秀的！" },
                { t: "我會直接去問前輩，請他們直接告訴我答案。", s: "B", f: "找答案很快，但少了思考的過程。" },
                { t: "我會覺得這題目不適合我，乾脆跳過或是放棄這門課。", s: "F", f: "放棄太可惜了，要學習克服困難。" }
            ]},
            { 問: "第六題：你最近有關注什麼新聞或讀過什麼書嗎？", 選: [
                { t: "我最近看到關於環境保護的新聞，覺得對未來很重要。", s: "A", f: "關心社會脈動，是很好的特質。" },
                { t: "我最近都在看有趣的網路短影片，可以放鬆壓力。", s: "B", f: "放鬆很好，但面試場合要有深度一點。" },
                { t: "我最近都在忙著考試讀書，沒時間看別的東西。", s: "F", f: "讀書機器不是我們要的人才。" }
            ]},
            { 問: "第七題：如果你同時考上兩間大學，你會怎麼選擇？", 選: [
                { t: "我會看哪一間的資源對我的未來更有幫助，再決定。", s: "A", f: "非常冷靜且理性的判斷力。" },
                { t: "看哪一邊的名氣比較大就選哪邊。", s: "B", f: "名氣固然重要，但課程內容更重要。" },
                { t: "聽我爸媽的意見，他們選哪一個我就去哪一個。", s: "F", f: "你已經是大學生了，要有自我的判斷力。" }
            ]}
        ];

        let 目前索引 = 0, 目前官 = null, 總積分 = 0, 遊戲計時器, 剩餘時間 = 20;

        function 朗讀(文字) {
            window.speechSynthesis.cancel();
            const 語音 = new SpeechSynthesisUtterance(文字);
            語音.lang = 'zh-TW';
            語音.rate = 目前官 ? 目前官.語速 : 0.8;
            window.speechSynthesis.speak(語音);
        }

        function 遊戲開始() {
            目前官 = 面試官庫[Math.floor(Math.random() * 面試官庫.length)];
            目前索引 = 0; 總積分 = 0;
            document.getElementById('角色名稱').innerText = 目前官.名稱;
            document.getElementById('角色頭像').innerText = 目前官.頭像;
            
            // 點擊後立即修復語音播放問題
            朗讀(目前官.名稱 + "說：你好，我是今天的面試官。面試正式開始，請看第一題。");
            顯示題目();
        }

        function 顯示題目() {
            const 題目 = 題目庫[目前索引];
            document.getElementById('對話框').innerText = 題目.問;
            document.getElementById('進度文字').innerText = `進度：${目前索引 + 1} / 7`;
            document.getElementById('結果層').style.display = 'none';
            朗讀(題目.問);

            const 選項區 = document.getElementById('選項區');
            選項區.innerHTML = '';
            題目.選.forEach(x => {
                const b = document.createElement('button');
                b.className = '按鈕';
                b.innerText = x.t;
                b.onclick = () => 處理回答(x);
                選項區.appendChild(b);
            });
            啟動計時();
        }

        function 啟動計時() {
            剩餘時間 = 20; 
            const 條 = document.getElementById('計時條');
            clearInterval(遊戲計時器);
            遊戲計時器 = setInterval(() => {
                剩餘時間 -= 0.1;
                條.style.width = (剩餘時間 / 20 * 100) + '%';
                if (剩餘時間 <= 0) { clearInterval(遊戲計時器); 處理回答({s:'F', f:'你沈默太久了。'}); }
            }, 100);
        }

        function 處理回答(選) {
            clearInterval(遊戲計時器);
            let 分 = 選.s === 'A' ? 100 : (選.s === 'B' ? 60 : 0);
            總積分 += Math.round(分 / 目前官.嚴格度);

            document.getElementById('結果層').style.display = 'flex';
            document.getElementById('結果標題').innerText = "評價：" + 選.s;
            document.getElementById('結果標題').style.color = 選.s === 'F' ? '#ff4136' : '#ffcc00';
            
            // 加入教授專屬口吻
            let 回饋文字 = 目前官.語助詞 + " " + 選.f;
            document.getElementById('結果評價').innerText = 回饋文字;
            朗讀(回饋文字);
        }

        function 下一題() {
            目前索引++;
            if (目前索引 < 7) 顯示題目();
            else 結算最後結果();
        }

        function 結算最後結果() {
            let 錄取狀態 = 總積分 >= 500 ? "🎉 正取錄取" : (總積分 >= 300 ? "📋 備取待定" : "❌ 未錄取");
            let 專屬建議 = `【面試分析報告】<br>考官：${目前官.名稱}<br><br>你的總分是：${總積分} 分。<br>教授建議：${目前官.結語}`;

            document.getElementById('結果標題').innerText = 錄取狀態;
            document.getElementById('結果評價').innerHTML = 專屬建議;
            document.getElementById('下一步按鈕').innerText = "重新練習";
            document.getElementById('下一步按鈕').onclick = () => location.reload();
            朗讀("面試結束。結果是" + 錄取狀態 + "。請查看報告。");
        }
    </script>
</body>
</html>
