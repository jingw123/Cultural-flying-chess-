<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台南文化大冒險</title>
    <style>
        :root { --bg: #faf3e0; --red: #b71c1c; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; }
        
        /* 遊戲盤主容器 */
        #board-container {
            position: relative; width: 350px; height: 500px;
            background: #fff; border: 8px solid var(--red); border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* 36格寫死佈局 */
        #game-board {
            display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(6, 1fr);
            width: 100%; height: 100%; gap: 2px; padding: 5px; box-sizing: border-box;
        }

        .cell {
            background: #fff; border: 1px solid #eee; display: flex; flex-direction: column;
            justify-content: center; align-items: center; font-size: 10px; font-weight: bold;
            text-align: center; color: #444; position: relative;
        }
        .start { background: #ff7675 !important; color: white; }
        .end { background: var(--red) !important; color: gold; border: 2px double gold; }

        /* 棋子 */
        #player-token {
            width: 35px; height: 35px; position: absolute; z-index: 100; font-size: 28px;
            display: flex; justify-content: center; align-items: center; pointer-events: none;
            transition: all 0.4s ease; left: 15px; top: 430px; /* 初始位置在第1格 */
        }

        .controls { margin-top: 15px; text-align: center; background: white; padding: 15px; border-radius: 20px; width: 300px; }
        button#roll-btn { background: var(--red); color: white; border: none; padding: 10px 40px; font-size: 18px; border-radius: 50px; cursor: pointer; }
        
        /* 彈窗 */
        #modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .quiz-box { background: white; padding: 20px; border-radius: 20px; width: 80%; border: 5px solid var(--red); text-align: center; }
        .opt { display: block; width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; }
    </style>
</head>

            <option value="🩴">🩴 藍白拖鞋</option>
            <option value="🏮">🏮 文創天燈</option>
            <option value="🌙">🌙 聖杯擲筊</option>
        </select>
    </div>
